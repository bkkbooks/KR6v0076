body:
  text: 屏沙王白佛言何謂為八王日者當何以知之佛告王八王日者諸天帝釋參佐鎮臣三十二人四鎮大王司命司録五羅大王八王使者盡出四布覆行持四王十五日三十日所奏文書案校地方人民八夷鬼神飛鳥走狩立行善惡知與文書同不地獄王亦遣輔臣小王都録監司廷尉郵公伏夜將軍五帝使者同日同時俱出承天竹使符統攝衆生禁檢非法捕惡賞善有罪即效重犯者即收神録命福多者移書關下天上地獄增壽益算除死定生一歲八出故謂八王日欲知日者立春春分立夏夏至立秋秋分立冬冬至此日最急歲終事畢考課結定罪福決死定生為急終到立冬屬春立冬冬至是為八王日前一日夜半竟後一日夜半是其時也重犯者謂從前齊八王日犯過福彊有救安隱無他天帝將軍鎮王使者司命主者用福故原貰過之到後齊王日復犯是為重犯者王白佛言何等為五官者佛告王曰五官者亦大分治黎庶天上五官主賞善地獄中亦有五官與主五道大鬼神王收捕罪人六事罪屬五官一者行五逆罪二者行十惡三者不行五戒四者不敬三尊五者不畏天禁何謂五官一者仙官主禁殺二者水官主禁盜三者鐵官主禁淫四者土官主禁兩舌五者天官主禁飲酒犯罪屬地獄五官呼名各自有時好殺無慈心口行惡為仙官所録命在春好盜貪求無厭劫人為水官所録命在冬好淫欲為鐵官所録淫鬼食其不淨並飲心血病在心肝腎頭目命在秋好酒醉亂仁義不行禮教廢為天官所録命在夏好妄言兩舌惡口傳舌讒人誹謗聖道為土官所録命在季月五官主人根人根從五事生故有五官乃自然之王也五官及輔臣小王都録監司廷尉郵公伏夜將軍五帝使者收捕罪人録命收神死者不同皆依本罪故令不同屏沙王白佛言流沙俗人本所不知本所不曉肉眼濁翳不見天神鬼王監伺來時云何避之佛言欲避天神鬼王以救大難者則為欲求無量安穩無極之福諦聽思念內著心中莫忘莫失王及大衆皆言受教一心奉持佛言未得道者持五戒上至具戒人名曰戒眼貪著吾我不見聖諦貪求益得走作思慮東西南北四出治生更相欺中淫蕩無度殺生可口酒亂無禮不奉聖化不畏禁忌行來至趣放心恣意從其所欲可足諸情心亂如蘊不覺行入三苦自許以道死後受殃悔無所及今得自在欲求何道隨心得之求大得大求小得小三乘之寶藏譬如海水取者便得三塗之災亦復如是六藏俱然三善三惡俱無吏將守也求者便得作罪得罪作福得福求道得道自作自得以心為本身為行首審諦求道不欲與三惡道從事不欲為地獄惡鬼所録欲削除地獄名籍者當追明師從受五戒具足奉行九齊八王之日守持十事立志令堅何謂為十一者齊日當詣佛寺燒香散花繞塔禮拜三尊種道根栽二者當從師受齊如法持之隨師教令三者堅持五戒四者專心念道五者閈諸情欲六者念佛念慧念師恩重七者不得念妻子居家財寶一不得念持心如真人八者不得妄行來九者深自責本罪十者不得念一切人惡當施立功德本消滅殃罪是為十事九齊日者先前一日當自嚴設斷絶因緣男女別坐飲食香潔至其齊日令得清淨齊戒完具八王日者當先前一日男女異處守持十法齊竟後一日夜半所以爾者諸天帝釋四鎮輔臣司命使者當下覆伺竈君在人左右肩上有左右契左神男右神女男神疏善女神記惡先前一日夜半盡共上天校定罪福各自求功諍了罪福毛分不錯諸天亦自有歲盡簿書分明竈君左右契重復持九齊所記校四王所結知為同不校事三日決死定生罰謫了定事諾聽還罪數多者滅壽奪算條名尅死歲月日時關下地獄地獄承書即遣獄鬼持名録召鬼無慈心死日未到鬼隨不遠推排強使作惡欲速其命或五年或三年一年半歲百日一月十日三日一日罪惡之人為鬼所使妄作非法稍近死地命日促盡其福多者增壽益算天遣善神營護其身條名關移地獄拔除罪名除死定生後得上天為諸天所尊生天地獄各有迎人人病欲死時眼自見來迎者應生天上者天人持天衣伎樂來迎之應生他方者眼見尊人為說妙言應墮地獄者眼見兵士持刀楯矛戟鐵索圍繞之所見不同口不能言各隨行所作得其果報罪輕微者榜擲之謫者録神受罰其人即病各有日數輕重不同所繫官亦不同隨行所屬天無枉濫平直無二隨其所作天網治之屏沙王白佛言流沙受何罪徒謫形竟何時繫在何官願示所在罪過輕重竟不竟佛告王流沙所犯過無花實唯有根莖節罪從心生意惡嫉妒毒心施人意惡懷毒天上所屬星被對下人即病星者天之光人之精精神被問繫在土官受謫千七百九十日罪乃竟屏沙王白佛言我見人日日犯惡強健無病者何天神豈不知邪犯大過亦無死者犯小過亦無受病謫者復有守善死亡不利疾病縱橫更相注瀆善惡不分孩兒無過復有病者死者何因復爾願釋所疑令知本罪佛告王曰所問大善善思念之當為一切解釋愚癡令得開解佛言三界顛倒甚難了理非阿羅漢辟支佛之所能知人根深遠受形無數或尊或卑或貴或賤或父為子或子為父或母為女或女為母或母為婦或婦為母或兄為父或父為兄或姊為母或母為姊或姊為婦或婦為姊或弟為父兄或父兄為弟或師為弟子或弟子為師或師為父或弟子為子或君為子或子為君或君為臣或臣為君或父為君或君為父或父為臣或母姊為君婦或君婦為母姊或己婦為君婦或君婦為己婦或兄為君弟為臣或弟為君兄為臣或師為君或弟子為臣或太父為君父或師為太父或弟子孫子臣為太父或怨家為子或為父兄或怨家為兄弟或怨家為父母或怨家為婦及姊妹或怨家為君為臣或怨家為伯叔或為外家內親或怨家為奴婢僮僕或怨家為朋友親厚知識或怨家為將主或部民或怨家為鄰里或父殺子或子殺父或兄殺弟或弟殺兄或母殺子或子殺母或夫殺婦或婦殺夫或姑殺婦或婦殺姑或母殺女或女殺母或君殺臣或臣殺君或奴婢殺大夫或大夫殺奴婢或奴婢殺大家或大家殺奴婢或祖父母殺孫子或孫子殺祖父母或師殺弟子或弟子殺師或父食子肉或子食父肉或兄食弟肉或弟食兄肉或母食子肉或子食母肉或夫食婦肉或婦食夫肉或君食臣肉或臣食君肉或師食弟子肉或弟子食師肉或婦食弟肉或弟食婦肉或怨家相食肉或大夫食奴婢肉或奴婢食大夫肉如是顛倒或奴婢為父母兄弟或父母兄弟為奴婢或伯叔為奴婢或奴婢為伯叔或奴婢為君將主或君將主為奴婢或父母為牛馬驢騾雁膚豬羊犬或兄弟為牛馬豬羊犬或為驢騾雁馱或子為雁馬驢騾牛羊豬犬人在生死海顛倒或高或下或尊或卑或貴或賤或親或疏幡覆顛倒更相茹食乘騎無有上下宿命相讎嫉更相殺害共相食噉因為怨結或在鬼神中來相殺害或天上來為民主識宿命或在龍阿須倫中識宿命或在地獄中識宿命共相遭逢對有大小德行各有厚薄德有勝貧宿對惡責適相遭逢惡心自起便欲相殺以報宿怨雖受天身十結未解得對便起宿命福強今雖行惡宿福退救不逢苦厄未遭宿怨其罪未熟至其熟時自受其殃貞良現禍以宿福薄為故世罪所追遭逢宿怨對至不救其福未熟至其德熟自受其福殃福自追如形影逐人都無與者作是得是自作自得不作是即無對亦無所得一切皆由因緣生孩兒無過而有病者死亡者當知是人宿命故世魚獵探撈破卵殺生衆多故得短命過生而去一切罪福命之長短苦樂憂喜皆由種生獲其類報種福得福種罪得罪種長命得長命種短命得短命種好得好種醜得醜如人種麥得麥種粟得粟種麻得麻隨其本種生其類報人之種行亦復如是王不足疑也持一戒完者一天令五神護之持五戒具者令二十五神營救門戶上至六天凡有百五十神番代擁護不令衰耗諸天歡喜皆言善哉當共護之如是持戒完具者十方現在諸佛皆稱歡是善男子善女人臨壽終時佛皆分身往迎之不使墮惡道若戒羸者當益作福德布施持戒忍辱精進一心智慧燃燈燒香散花禮拜益持齊戒亦復得度戒不完者諸天善神稍遠離之犯一戒者二十五神去之犯五戒者百五十神盡棄離遠之惡鬼稍嬈近因衰病之耗亂其家遂致衰喪不利財物不聚所向不偶死入地獄雖戒完具不持九齊如六畜不生乳樹無果實婦不生子種穀不滋治生無利折耗失本作吏無衣幘使者無傳寧有信用者不不持齊者如人裸身無有四時衣如人倮形無衣寧可用入衆貴人中不也王曰不可也佛言弟子不持齊齊不如法無清淨福戒倮無護為無輔助如人孤獨無有臣子倮形無衣露居無舍必有恐畏不持齊有五事勤苦何謂五事苦也一者恆生穢濁處二者所生之處雖得人身難與三尊會三者更生信道難四者更生求師難得五者世世求道難得定是為五事苦復有五事苦一者恆生多事處二者生多驚怖處三者生五從殘處四者恆生劇苦地五者生邊地無福之處是為五事苦合為十苦劇也復有五事自侵欺一者不用佛教二者不用師教三者言我持齊不從師明經道士受齊四者不受法化五者持齊不完為自侵欺亡失大福復有五事亡失大福何謂為五一者恆生愚家二者難得出家三者所生貧匱家四者不得升入道場五者頑愚難化是為五事復有五事難何謂為五一者生中國難二者生貴人家難三者求作沙門難四者求智慧難五者求解脫難復有五事難何謂為五一者生佛前難二者求安隱難三者求三昧定難四者斷絶生死難五者求清淨難復有五事難何謂為五一者若後罪畢得為人主安國難二者若後為天度人難三者除罪難四者求六度難五者解十結離著難是為五難不持齊者有是三十五難難得度脫佛言末世時人作佛弟子為世事所逼役荷民窮衣食不充熱惱自隨不得從心所願不成皆宿命不持齊不精進懈慢不從師教令或持齊或不持齊或有布施或不布施有無多少各隨所作德本受其殃福或在他方清淨佛國不行清淨漏行所致福不還生天罪不應墮地獄謫來生閻浮提續人種令不斷絶或從天上來生閻浮提或從人道中來生或從三惡道中罪畢得生為人五道中生死交符更相換代晝夜往來日日不絶譬如天雨以續人種故不斷絶皆由宿命齊戒不如法謫來生是家衰末五燒毒燃濁世受是十苦之惱十自侵欺之患墮十五綴礙之難回流三界十二輪轉生死不絶受苦無竟但坐宿命不奉大人重訓棄正行邪故受是三十五苦惱不得度脫無盡意菩薩白佛言世尊每授人戒並持九齊皆言盡形壽今復教弟子齊日更受齊法何因得爾經法至重如是為慢法弟子耶佛告無盡意菩薩佛授人戒欲度脫居家修道當持五戒行歲三齊除三毒月六齊制六賊九齊除九惱滅九思愈九病閈絶十二惡道開十二門令至泥洹士女持齊戒常令究竟盡畢形壽然弟子受戒以後故有欲著經營居家畜養妻子縣官之緣奴婢債主役使衣食之求販賣治生墾地種殖殺生萌類貪求無厭放心恣意三毒猛盛六神各逐所欲心垢積厚垢穢之罪引人入冥室受苦無竟已聞道門當令閉塞三塗八難之處令得至泥洹清淨無為猶如長者有大寬堂舍以圈牛馬羊豬滿中作糞節日已逼貴客當來無餘坐堂不及除掃即以沙土而覆糞上喚客前坐主人設好美食種種香美食客至暮時客還去主人續圈牛馬豬羊屎尿滿圈上至七日雜畜衆多屎尿以厚有遠方貴客來不及除糞如前以沙土覆上復用過客遭年六中凡百二日過客百日過蘊圂糞各有百二重弟子齊日不從師明經道士受齊便言我已見經曉解齊法了了自於舍持齊專精勤進念道不懈清淨無欲已滅穢念持心如真人而無瑕垢譬如長者以好沙土覆糞屎尿上善男子善女人受佛五戒十戒為尊者子當令如法人身譬如大堂舍馬牛豬羊譬如外五欲之利糞譬如惡念也至自持齊清淨者如土覆糞上用不從師受自淨齊日自言我曉齊法因自持齊如法奉行清淨齊日猶如沙土覆屎尿不淨罪福相纍重數分明後當受罪福之報一一不失一念受一身善念受天上人中身惡念受三惡道身百念受百身千念受千身一日一夜種生死根後當受八億五千萬雜類之身百歲之中種後世栽甚為難數魂神遂種受形遍三千大千剎土中地間無有空地於是佛愍念十方哀傷弟子回流沒溺沈沒愛海生死苦惱故設法橋化度無福令得解脫弟子心迷習俗勞垢日生佛以三淵法水洗治弟子六衰之垢令得解脫前齊日已過七日之中罪垢復生重復齊福罪垢未厚復到後齊大慈愍傷開法惠水洗去欲垢令得清淨猶如除糞到本淨地香潔可居弟子齊日恭肅清淨驚怖監司畏懼神明齊日當棄家居緣務就詣塔寺禮拜三尊從師受三自歸八關齊於廟堂如法持之猶如除糞到淨地齊過後男女更相染汙到後齊悔過三自歸思惟前齊七日或五日其間所施行身口意凡犯幾過至心懇懇首過三尊慎無覆藏著恥須臾之間而不自首過後長受痛無竟已時悔過首罪更受三自歸受清淨齊齊福相接間無罪垢清淨得度無盡意菩薩白佛言世尊慈恩愍念弟子劇如慈母念其赤子子不念母育養之恩弟子亦復如是佛言如是如是但用愚癡無黠故佛說是時八百比丘漏盡意解三百菩薩入淨光三昧三萬天人發無上正真道意三萬二千清信士萬二千八百清信女皆見道迹千億天人皆遠塵離垢三十億凡士二十億凡女悉得法眼前受五戒莫不歡喜作禮皆言幸賴得聞清淨妙法以救生死制斷三流四瀆澆滅三毒之熾火蕩滌六情之垢漸近清淨守齊無為漸近泥洹無盡意菩薩白佛言善男子善女人受佛五戒十戒得為尊者子應在尊者坐次不耶佛言若善男子善女人受佛十戒五戒得為尊者子居家臭穢不得共尊者比丘同床席坐應當別坐尊者比丘坐復尊過於國王太子長者之坐皆有大尊天神衛侍左右白衣不應共坐正使出家持十戒作沙彌亦不應共坐起飲食正使具戒大沙門犯戒心不清淨尚不應共坐何況白衣持五戒十戒者亦不應與白衣凡人共坐起汙尊者子殺生淫盜兩舌醉亂無禮無義屠兒偷僧物不當往來交易借貸與之薩瀆虧損道行共相汙染引人入地獄門自作留難墮隧惡道為人證任繫綴三界不得時度愁苦憂惱痛不可言如人與盜賊為友其賊有罪王收捕著獄五毒治之獄吏問賊卿與誰為友具說意狀囚言我與某長者為友即便聞王王即下外部録召長者長者來到王便問曰聞卿好人貴人之種何不自愛擇善人為友反與不肖惡人為友今日為此死罪囚所引卿復作囚云何長者白王言此囚亦好人君子與我中外兄弟或言婚親士大夫邂逅遇事耳王言此無罪人與同罪者亦當死卿欲云何長者對曰實自不知雖與囚為友實不見不知願王聖心採察明某口口守善未曾犯惡某有為佛弟子王言卿為智人何不教令禁檢縱而置之卿為已共同心作賊坐與為友或教之或為作方便卿雖不能禁止者何不遠避之且往詣獄罪人若不怨卿辭不及卿者放卿使去弟子與凡人凶愚無戒行者犯戒者共相交往後為俗人所引入地獄地獄主問弟子卿為佛弟子何不持佛經戒教卿知識鄰里朋友親族卿為智人縱而置之無有慈心不念衆生今此罪人引卿云何不教我我愚癡不曉佛道謂死生不屬佛謂天云為大死生屬天不知有地獄不教我不度我如是罪人怨亂云卿無慈心不相念度卿促人為罪卿不能教度者何不遠避之弟子對曰我謂但自持戒守善為佳德行不高實不能度人又不用我言願王原救除我過罪我是佛弟子尊者子也佛言清信士女當自慎護令清淨慎無與凡人為友為侶引人入地獄中也無蓋慈菩薩白佛言凡夫士女前世持佛五戒今得人身依道而生貧富貴賤好醜長短苦樂不同安危事異或有復還信佛者不信者其意云何願釋所疑當令大衆而得開解佛言善哉善哉憂念人民乃爾佛告無蓋慈菩薩人有六事得生富貴家何等為六一者用善師教二者喜布施三者持九齊五戒不犯四者行忍辱五者一切行恭敬六者孝事二親禮拜三尊是為六事生豪富家復有十事生則知道信佛三尊一者立願二者精進持九齊不廢三者不行八邪業四者不使巫師卜問解除五者不祠天求福六者不事外道不稱歎外道七者不為邪業八者不為蠱道九者不行幻術十者不與夷人從事是為十事行恆生中國便能信佛三尊後世升天福堂纍劫無患人不能奉行此十事者生墮邊方八難處貧賤家又不信道或不值佛世常在冥室陷墮六川纍劫不出無蓋慈菩薩白佛言持五戒行布施得生富貴家當得老壽復有少死者何佛言殺生作施雖富不壽無蓋慈菩薩白佛言貧富癡黠不別富而癡者貧而黠者長短不同好醜亦爾其意云何佛言皆由宿命作人時修行所致種德不同故布施不行忍辱不喜聞經後世富且愚持戒讀經行忍辱不布施後世聰明黠慧辨才多智端正且貧長短不同者好喜廣學廣智慧廣教人起立迎人後世得好身形智慧中王不能廣智慧有慧乍欲語人乍不欲語人起立迎人短且愚人之種行隨本種自得其報說是語時二千萬比丘漏盡意解十萬菩薩皆得信忍四十萬天人皆入六度三昧定四方菩薩弟子行者諸天人民不可計數從四方稍來滿八十里廣縱間無空地聞佛說經莫不歡喜三十萬清信士七萬清信女皆得六慧智度無極八千比丘尼皆得柔順忍二十億天人發無上正真道意百萬鬼神龍阿須倫乾沓和閲叉等皆發無上正真道意地獄王官屬千億重發無上正真道意願畢形壽得作沙門奉行清化福度衆生爾時法意菩薩下坐長跪叉手白佛言多陀阿竭為如本無法隨法度無人民佛告法意菩薩多陀阿竭不見本無法亦不見隨法度者亦不見有三界亦不見有諸天人民亦不見有人亦不見無人亦不見生亦不見滅亦不見度亦不見度者亦不見吾我亦不見五陰六衰亦不見身心意識亦不見地水火風空亦不見四大合時亦不見不合時亦不見色痛癢思想生死識亦不見諸法來時亦不見諸法去時亦不見色痛癢思想生死識本亦不見地水火風本無有本說是三昧時八萬菩薩皆得阿惟顏如本無無所有七萬菩薩得不退轉二十萬比丘逮得無所從生法忍百萬天人得不起法忍五百清信士得淨意解脫三昧七千萬清信士下髮作沙門皆得信忍十億凡士三十萬凡女皆發無上正真道意前受五戒八百龍王皆發無上正真道意爾時大忍菩薩白佛言多陀阿竭以大慈哀念十方諸天人民法雨三界潤澤群黎莫不得過度者多陀阿竭用意淨故所說清淨言辭清淨如法清淨忍者無猗空無處所心無端底忍大勤勞忍伏諸情忍大生死以無蓋慈救衆人病令一切諸天帝釋梵忍天勝英天子國王臣民龍鬼神莫不忍棄諸欲態惡忍本淨根根生莖節莖節轉生花實生花實復還本無無所有忍守根門以法化導令入泥洹佛告大忍菩薩一切大聖皆行大忍自致成本無如來化導衆生忍不視色眼則清淨忍不受聲耳則清淨忍不受香鼻則清淨忍不受味口則清淨忍不求細滑身則清淨忍不多念則心清淨忍不思想則意清淨忍不分別上中下好惡識別萬物為作名字心無所著意無所想識無所別則為識清淨外六事本清淨內六事本清淨外六事為泥洹內六事為身本外六入內內六喜樂受之受之者為不淨故使隧三塗譬如淫妷女人雖不行求男子視外如貞內常思念有男子從遠方來寄宿外堂夜人定靜時彼失聲不在遠方男子因往親近主人婦婦人得男子心中獨喜因留三日外六內六更相淫汙諸情各受所習淫婦女習愛男子留三日者謂心意識淫著情外六為男子內六為婦人留者謂外六事與心意識共相可入因種生死淫於六欲種罪根本菩薩常行大忍不淫六欲內外清淨如本無清淨心意識清淨無瑕穢自致得佛道解脫菩薩白佛言諸法無著無縛無脫色無著無縛無脫色之自然故痛癢思想生死識本無無著無縛無脫何以故本淨故地水火風本無無著無縛無脫本淨故吾我本無無著無縛無脫身心意識四事本空無著無縛無脫何以故因沒溺四瀆水流漏入三苦不得解脫佛言善哉善哉解脫菩薩如汝所說無有異皆佛威神之所致諸法如本無無著無縛無脫色痛癢思想生死識如本無無著無縛無脫地水火風如本無無著無縛無脫薩云若如本無無著無縛無脫多陀阿竭如本無無說經無著無縛無脫佛心與衆生心等無有異多陀阿竭本在凡夫時心如凡夫心無有異亦六欲所溺回流三界隨四顛倒受形無數更生更死或男或女或尊或卑或貴或賤受身周遍三千大千國土持針刺地皆中我故身後見寶蓮花如來至真等正覺明行成為善逝世間解無上士道法御天人師號佛世尊住世二十中劫時佛為諸天人民說六度大法我時儒童往而觀之聞佛所說心開意解前受五戒三自歸命持九齊不失教法行之不廢功積致佛佛言欲求道遠離罪門者當奉佛經戒追事明師給事所須當隨師教數數講論三潤之法水洗心垢穢心淨得度一切衆生擾擾但諍咽喉不急之事萬罪還自纏繞或相害傷忿怒成仇皆由貪生競諍利欲群迷雷同不識道義老死日加常與罪對溺于五陰六衰侵漏三苦受罪無竟是身如聚骨連鎖支柱筋束而立內盛臭處外強文餝身如畫瓶外以五彩餝之內盛膿血屎尿不淨愚者保之長處生死不得解脫苦劇終身囚繫在於牢獄無有出期衆生樂於生死自沈五江沒於三瀾無有出期但坐隨六情逐世榮名噓天雅步尊身重名虛僞無信衆態在內如鐵生垢自消其形都不覺知人為六情所消消滅人形死不復生諦觀如是當行布施以戒神水澆除五陰之垢建志求生除死滅憂關閉獄戶斷絶苦本便得泥洹故心之自然棄除五陰六衰解脫無有憂苦淨度白佛言阿耨多羅三藐三菩提阿惟三佛用一切衆苦故愍念衆生永處七痛變惶纍劫無有終竟故演尊妙經典之要等度一切三界群生莫不解脫安至泥洹心空意淨六情澄清淡然不起蕩除三界三塗盡度地獄虛空莫不歡喜逮入道門無不獲安此彼無二等度一切德尊巍巍恩蓋天地尊極無過佛者佛告淨度及四部衆各各明聽吾當說之一切諸天人民鬼神龍阿須倫閲叉乾沓和等受佛重戒治心穢病求度世道者持五戒上至五百戒為入律弟子能與諸情諍者乃為信順道化審諦畏罪志欲求道者勤持律行畏順縣官奉上敬下如奴事大夫朝廷肅清以智教愚以黠教癡愚癡者當勤詣智黠者問受受則奉行不得缺犯若缺犯者當尋聚衆隨實至誠首過不得隱回有所畏難居神著泥梨中後悔無益若有知法律者見人有過不糾舉治之為與同罪何以故坐共同一處故也淨度白佛言何謂為淨何謂為不淨何者可同一處何者不可共一處佛言人於生死地持戒不犯如毛分者為淨犯戒者為不淨淨者可共一處不淨者不可共一處淨度白佛言實爾天中天四部弟子從生死急難之地持五戒求人道持十戒求羅漢道持具戒求菩薩道獨立甚難持律立行自可不犯道禁奈何禁他人惡人犯戒善人終不犯戒善人奈何正惡人佛言我法中不受大惡人末世時我弟子不承至法用名譽故取求弟子至令有惡人耳惡人犯戒放逸傲慢不畏禁戒者持法律者案法治之小過笞之一百中過笞之二百福罰之大過笞之三百福罰之不改不首過者長擯棄之佛告四部衆不知法律者為未作沙門為未持戒非佛弟子已知法律不當慢法受人意氣縱人入罪死後共入鐵城獄中淨度白佛言末世時人衆不用法律一人之力那衆何而伏之佛言能感佛恩愍傷衆生福度一切令得解脫者大法欲危沒命濟之便以律戒示天子國王以正佛法不能爾者為不行大慈愛少棄多且行忍辱出群愚之衆獨處山澤樹下冢間日慎一日結伴不良不如獨行獨善無憂奚用伴為結友不固久則成怨今微相尅記後成大怨天神所識生生相值智者避之愚者近之延智曰明延愚曰惑習智成聖習愚失行一世能正心三世受吉祥一世心不正三世受惱患淨度白佛言持法律沙門當云何正居士戒耶佛言如父正子如君正臣不亦易耶白衣居士不如法教者亦當持法律度之淨度白佛言白衣居士悉應用法律罰治耶佛言四部之衆盡用法律共相整頓如長者恆賫不死之藥若飲食為病若寒熱為病若中風為病若鬼神所病尋時服藥病則除差長存不死為佛弟子亦復如是得持法律人共相遭值如見佛不異常以三時督厲弟子不令罪生如長者尋服不死之藥良藥苦口以愈百病苦言逆耳以利身行此之謂也淨度白佛言佛每教弟子常默不語今復設是教耶佛言弟子之法求道之初常默是法所以持法律者當語用正衆人故耳淨度白佛言不語者則為善語則為不善不善難居善者易居誰欲為不善乎佛言大慈人乃能持法律憂念一切令度脫言如法語如法者是則為善不偷不諂不二意是則為善不囚懷不失正是則為善糾舉奸非令衆度脫是則為善不謂默然從而入罪門者為不善也度人者為善不度人者為不善捨小慈行大慈者為善正真道教勸厲衆生令發無上正真道意是為最善
