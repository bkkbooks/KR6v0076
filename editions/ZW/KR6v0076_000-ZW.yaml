body:
  text: 淨度三昧經整理者大內文雄齊藤隆信題解在諸經錄中最早著錄淨度三昧經的是梁僧祐的出三藏記集在出三藏記集卷四的新集續撰失譯雜經錄中著錄了二卷本卷五的新集抄經錄中著錄了南齊文宣王蕭子良的四卷本抄經與闕本的一卷本抄經此外在卷十二的法苑雜集原始集目錄法寶集上卷第二中作為八王日齋緣記第十一的出處也著錄了該經即在五六世紀之交人們已經知道有三種淨度三昧經一種是譯者不明的二卷本一種是四卷本抄經還有一種是一卷本抄經但僧祐撰錄時為闕本僧祐曾特別注意到該經中有關於八王日齋會的論述上述諸種經本都沒有留下譯者的姓名隋唐時期這一情況發生變化該經隋代曾入藏同時又被判為疑偽經入藏的是法經撰眾經目錄卷一所收為三卷本費長房撰歷代三寶紀所收為二卷本判為疑偽經的是法經錄卷二將蕭子良的四卷本抄經歸為偽妄彥琮撰眾經目錄卷四的偽妄中則記錄了蕭子良的一個三卷本的抄經此外歷代三寶紀記錄該經有四種譯本即北魏曇曜翻譯的一卷本劉宋智儼翻譯的一卷本寶雲翻譯的二卷本求那跋陀羅翻譯的三卷本到了唐代情況又發生變化由武周明佺等編撰的大周刊定眾經目錄卷十三之見定流行入藏錄將三卷本著錄為真經同時在卷五將費長房著錄的四種有譯人的經本一律著錄為同本別譯而智昇的開元釋教錄將上述四種有譯人的經本著錄為同本異譯並闕在卷十八的疑惑再詳錄中著錄了三卷本的淨度三昧經在卷二十入藏錄的末尾特意附注淨度經下十部十五卷並是古舊錄中疑偽之經周錄雖編入正文理並涉人謀故此錄中除之不載圓照貞元新定釋教目錄的不入藏目錄繼承了智昇的著錄由此一般的大藏經都把該經排斥在外但淨度經曾被權威的敕撰目錄大周刊定眾經目錄作為真經著錄影響想必很大現存的七寺本敦煌本都是三卷本其原因大約就在於武周時曾廣為流布的入藏真經就是三卷本而那個三卷本後來成為七寺本敦煌本的祖本武周時的三卷本源于隋代的三卷本或二卷本雖然我們現在無法知道隋代該經的內容但是正如以下所要敘述的梁代以來許多典籍引用的文字與現存三卷本內容完全一致這證實它們是根據梁代失譯的二卷本或者出三藏記集之法苑雜緣原始集目錄所傳的淨度三昧經傳本編撰成的如前所述出三藏記集記載了在法苑雜緣原始集目錄中保留著淨度三昧經中有關於八王日的敘述這部分內容現在七寺本卷二之開頭敦煌本卷上之末尾與此類似在梁經律異相唐法苑珠林諸經要集等類書中也保留了若干引文經律異相的引文全部集中在卷四十九之地獄部在此列舉這些目錄並擬與唐代類書中的引文作一個簡單的比較經律異相引用淨度三昧經目錄一閻羅王等為獄司往緣二三十地獄及獄主名字三五官禁人作罪四應生天墮地獄臨終有迎見善惡處五八王使者於六齋日簡閱善惡上述引文中第五條被法苑珠林卷六十二之祭祀篇祭祀部所引諸經要集卷十九送終部捨命緣及祭祀緣則轉引了上述第四條第五條此外第三條被法苑珠林卷二十三慚愧部引證篇所引引文與七寺本卷二的文字基本一致上述這些引文已足以說明這部經典在類書中通常被人們認為是一部論述死後報應特別是下地獄問題的經典它還論述了人死後所得境遇的好壞完全由對其生前行為的詳細調查與報告來決定這使我們想起後代出現的所謂功過格類書並不以宣揚特定的教義為目的從諸類書對該經的摘引我們也可以明白智昇以前的佛教界對該經的一般評價另一方面我們也可以看到從北朝末年以來隋唐諸家著作引用該經典時有兩種不同的態度有的持肯定的意見如三階教信行的主要著作三階佛法淨土宗道綽的安樂集卷下善導的觀念法門及初唐護法僧法琳的辯正論卷一等上述著作都把淨度三昧經作為經證來引用對淨度三昧經的評價都是肯定的有的持否定的意見如道宣的主要著作四分律刪繁補闕行事鈔卷上之三師資相攝篇這樣說又有愚師引淨度經三百福罰此乃偽經人造智者共非縱如此經不起三毒者得依而福罰今順己煩惱何得妄依律中嗔心呵責尚自犯罪乃至畜生不得杖擬何況杖人道宣進而引述地持論中的上犯罰黜中犯折伏下犯呵責稱佛教亦無杖治亦即針對上述淨度經的引文道宣指出佛教的處罰原本只有折伏呵責等本無杖打人法儘管如此可當時的大德眾主等還施行杖責拘禁等處罰所以道宣對這一現狀提出批評並將淨度經作為批評的具體事例這說明在唐初至少在道宣見聞的範圍內在教團寺院內部還廣泛流行杖刑等體罰其依據就是淨度三昧經宋元照四分律行事鈔資持記卷上之三中提到淨度偽經如序所列是指在行事鈔的序中作為世中偽說或世中偽經從諸佛下生經到提謂經共列舉的部偽經在這部偽經中實際並沒有淨度三昧經的名字但對道宣來講凡宣揚淨度三昧經三百福罰之類觀點的那些偽經都是與自己所主張的正確的戒律相抵觸的正因為如此他特別注意到淨度三昧經對這裏所謂的三百福罰資持記中接著是這樣說的舊記云彼明重罪打三百中罪打二百下罪打一百皆得福也這與七寺本卷二靠近末尾部分所說的小過笞一百中過笞二百大過笞三百且福罰之的說法正好相應與其他中國所撰佛典相比淨度三昧經的卷數字數都較多下面略述各卷中值得注意的內容卷一的特點是列舉了三十地獄這已為上述類書所引用其末尾有一段文字論述八王日一直延續到卷二的開頭卷二的分量與內容都很豐富或許正因為此以類書為首的各書的引用也較多集中在這一卷特別值得注意的是淨度菩薩出場的那些部分該菩薩的名字與本經典同名道宣行事鈔所引的正在這一部分只要略微閱讀便可以感覺到該經典反映當時佛教教團具體狀況的色彩很濃卷三論述自度思想有一些極具特徵性的文句例如佛實不度人人自度耳另外其中反映出的在家信徒對佛教教團的批評也值得注意但是貫穿全經的最基本的要素是從地獄的輪廻中解脫出來這種輪廻以持齋五官伺察二十五善神之守護等事項為象徵這象車的兩輪那樣支撐著經典的全部內容其次的要素是作為指導僧的明師的存在這些明師不屬於教團上層他們在傳教實踐的層面上與在家信徒保持著經常的接觸支撐著佛教教團的基礎本經大約正是在這些僧人的實際活動的基礎上撰寫成的這說明佛教正在逐漸普及還沒有能夠完全滲透到民眾的最底層換句話說這反映了本經產生的時代背景是佛教的中國化還沒有完成此次錄校的底本卷一為日本京都大學附屬圖書館所藏本該本原為法隆寺所有亦即為卍續藏的底本卷二及卷三為日本市名古屋七寺所藏本七寺本卷二的首部殘缺若干行據斯號斯乙本補足另外經調查現知敦煌遺書中共有斯號等十二號淨度三昧經寫卷今均作為校本各校本的略號如下北甲本北號結號北乙本北新號北丙本北號結號北丁本北號霜號北戊本北號仄號斯甲本斯號斯乙本斯號斯丙本斯號斯丁本斯號斯戊本斯號斯己本斯號俄甲本俄號錄文
