body:
  text: 佛言末世時人獷強群凶賤善尊惡正法棄邪事苦有餘中正放逐佞諂寵位君子為蠻夷小人居朝坐大夫食糟糠僮僕食粳糧眾怨速疾大命將至時到變生禍及門族生此怨來久矣非適今也皆由宿命群凶殺生貪利快意歡喜歡喜作罪啼哭受報強健作惡羸露受殃罪福所錄生但是故人當慮報應守善勿疑佛告大會及諸弟子但遺後世福勿遺後世罪若弟子中或有惡沙門惡比丘尼惡優婆塞惡優婆夷來相壞亂當覺知魔為但相和解魔欲破壞法橋欲令墮落魔亂我意耳為佛弟子棄惡當如糞掃滲洗去垢勿遺其餘作後世緣勤求至法親敬明師穢弱者當依附勇健者病者當依仰強健者無目者當依有目者蹇者當依有腳欲行賈當依有本者人民依沙門沙門依佛佛依人民人民依仰沙門得若干種福亦可得道得福得道與侍佛身正等不異佛告淨度大士及四部眾道尊且貴道以清白為首領梵行為道信齋戒淨如水月是道之性若有不堪任清淨戒者不當自極強欲入海洗除眾垢竟未洗垢而反溺死弟子中有不能守護經戒身口意者不當強入弟子輩中更相染汙共同利者其罪同等慎之則為福淨度白佛言世尊弘演大慈愍傷眾生盡度一切十方諸天人民三塗之屬莫不過度者今復為未來者垂訓教化為後生者深垂恩覆蓋願禮如來無量覺佛告淨度一切諸天人民欲自度故乃受佛教戒如法奉行依佛慧自得福德得度得道佛實不度人人自度耳淨度白佛言佛開甘露門演六度無極四禪四等四諦大慈令一切依慧施行六度莫不免難度脫生死者佛說淨度等尊法如我目所睹見不可計百千之眾莫不從佛得度者佛告淨度如汝所言一切依佛三尊佛授與經戒盡可度之若有愚人作惡甚健不受聖化佛說萬章罪人不信不受佛教不能強度若復有宿惡之人多罪少福不憂死後神入惡道但念治生四出求利以為家業給與妻子齋日不肯入塔寺受持齋戒亦不念作福施導師教戒語之罪人端自謂為是而語師言道是我心中戒與法亦是我心中佛亦人師亦人我亦人人相似有何異多辭云云也佛告淨度如是輩人心無恭恪億佛不能療何況一佛是故人為自度佛不度人淨度白佛言何等人聞教即奉行自憂後世何等人聞教而不奉行亦不憂後世佛告淨度人從三惡處罪未竟大慈菩薩若師為救因假來出寄生休息惡鬼常護其人恒使其人心中注強愁念多怒惡性不可觸近其人不自覺知但知目前一世之事不知恒為獄收鬼司守不置邊人久以知行違道檢其人故謂行足自許以道死墮地獄甚可愍傷人從三善處來生聞教即奉行乃能自憂求度世道淨度白佛言人從三惡處來生者為無反復籠戾難化那佛言如是人從三惡處來生者惡心未歇獷強意未滅不仁無義骨肉相疏不好學問妒賢嫉能證入人罪語欲勝人又不肯奉持齋戒師父呵語欲使順戒奉法其人言戒法在我心中但念佛及師經戒行坐臥起不去心口復欲使我為那師日九齋之日何不詣塔寺齋戒耶其人言我非沙門何必塔寺一月持六齋一年之中妨廢家計百餘日吾寧可止不生活耶我知當爾我不受戒亂我心不得生活師曰吾但欲使卿得脫惡道耳不益吾身也致吾何為也其人言寺中諸沙門何不盡得道去故復與我曹相似塔寺我舍復何異乎道在我心中不在塔寺眾人中得也如是人輩當知地獄家假使來小休息耳獄鬼屯守不置其人不自知為惡鬼所守不知死後當入大泥梨中無有出期淨度白佛言其人為自知從泥梨中來出不自知死後當還入泥梨中不佛言人在胞胎中時端識宿命欲生時從逕道中到地神識亂忘失宿命不復識事淨度白佛言吾我人來踐迹者盲聾如群羊不知命在何時戀著妻子積聚財寶修治園圃遺與妻子作罪求利賤命重財好得惡與師教作福其人言和上不知我曹官私百端適不能死但道閑事和上閑居但思美食好衣不知我曹官私百事不可諧活官家亦有役使發調佛家當差亦復甚於官家我受戒直為更求役調師曰吾但欲使卿自得後世福福可救罪當棄其人言我今交欲餓死妻子飢窮無知者那知後世也凡布施之福自發心乃為福不在他人勸強也佛言如是人輩罪之所致不受勸厲之諫但自用心慳貪無信死入地獄五毒治之妻子財寶盡在世間了無福救受罪苦痛無復竟已悔言我平生之時愚癡不知益作布施不知益作諸善悔不益持齋戒悔已無益淨度白佛言其人已脫地獄來生為人不欲還入地獄可得爾不佛言可得爾當求明師受佛戒行歲三齋月六齋齋日如法益作福施勤加散華燒香燃燈禮拜悔過用師教令數數講論常從師問度世之道隨師節度死不復歸三苦處恣意所欲所生之處常在福地淨度白佛言其人地獄家假使來小休息當還受餘罪那得生福地佛言猶如大長者任獄囚出之囚自知餘罪未竟囚黠慧不惜所有依因長者廣作道地後亦得脫人亦如是地獄雖有餘罪待之其人依因三尊作功德何憂不生善處蓮華淨菩薩白佛言人已得為佛弟子如法清淨奉持齋戒自可長離三惡趣行之既易無所作為無煩勞不損功德力閑居無為何有難乎而憂三趣也我自憶念從本無中始出時得為人常保三道天上人間十方佛前至於今日未曾更三趣三惡冥路何所志樂而受患害佛告蓮華淨而眾生樂於欲為色聲香味細滑所誤猶如鷹師持一鴿捕數鷹人亦如是求六情利竟未歡樂長夜受罪誅貧富數已定愚者謂可益智者任宿福如耕有限量春種多秋收多種少秋收少人之貧富皆由宿種今不可力也世人不了是貪求無厭欲千錢利未有百錢益十倍稍零落歡曰不足言憂惱甚大多坐是入三苦永失于神路相淨菩薩白佛言何謂為五戒相何謂為十戒相何等為具戒相佛告相淨菩薩及諸會者明聽內著心中佛言守戒不犯心口恒淨不說師父短不證入人罪死死不犯戒堅住須陀洹地者五戒相也十戒相者謂捨世八事利衰毀譽稱譏苦樂難動如地禪求三脫與神同道道氣同無真人地十戒相也具戒相者樂戒閑居節少行來知足不求少欲易可慈愍眾生如母愛子欲令度脫心住阿惟越致地是具戒相佛說是時百萬菩薩得不退轉五十萬比丘得三萬三昧門十億天人發無上正真道意八萬士女皆得道迹長老摩訶迦葉摩訶迦旃延摩訶目犍連須菩提舍利弗等五百弟子離坐頭面作禮長跪叉手同白佛言何謂為淨何謂為不淨佛告諸弟子不持戒者為淨何以故淨不為諸情動外不入內內不著外用不著故為淨以淨故故不持戒不淨者持戒以不淨故持戒檢諸情使向本無向本無淨是故持戒者為不淨縛色長者聞佛大會廣度天人民雜類尊天釋梵盡共大會坐長者有五百美女甚重愛之常以嚴餝諸女如待賓客以自娛樂不離食息妒心在內欲留美女情中不能離欲與共俱行恐人眾觀狐疑不決佛力感致即將五百美女俱至佛所禮拜揖讓畢訖就坐而坐聽佛清化殊非流俗所用其事盡及長者意疑離坐禮佛足叉手長跪白佛言色者光目耀身人之所尚好聲者悅耳之音忘憂除患色聲香味細滑最是天下快樂之本佛皆反之耶佛告長者就坐諦聽內著心中信五色令人目盲愛色婬奔令人無色恒為婬鬼所守食噉五藏飲人心血令人髓消腦騫視聽不聽老病速至死入地獄有何樂哉五音陷耳之錐國家用之亡國破家臣下用之亂朝失位而身危亡家庶人用之男女多婬破家滅亡死入地獄有何樂哉長者白佛言天下之人以何為好佛告長者頭澤衣帛不為好面首端正不為好細色好身形不為好立行巧步不為好工言綺語不為好心端意正行合道化死得上天爾乃為好長者白佛言天下之人以何為樂佛告長者不謂藏積穢寶行則車乘坐則帷帳美女恣情飲食可口文彩服餝眾伎自娛坐呼立至應心所欲不為樂也謂奉持五戒十善行十法本齋四恩四等入八聖諦空無相願死而得泥洹是為最樂長者聞經欲垢漸薄五百美女結解發無上正真道意爾時外復有豪族長者七萬人來欲禮世尊前來長者使人閈門言內有宮人美女外人聞此有上妙婦女欲來觀我婦女耳我何為將美女來用示人眾人眾共觀我美女佛化作大城宮殿竟不能閈門外長者眾通問得聽便至佛所坐中長者語諸美女皆伏地勿為人所觀諸妙首婦女盡伏地七萬長者禮佛畢訖即詣坐次而坐於是佛告先來長者卿莫慳貪迷惑女色以心度他人心以意度他人意謂心等意同乃復不爾卿自謂美女好無比吾觀從頭至足盡醜無一好者譬如革囊內滿不淨身體骨幹肉塗血澆皮覆以蔽汙露汙露在內外強以餝幻人耳目樂家縛獄貪世不斷是種苦本色妒害賢禁止他人善心死受重殃長者白佛言婦人情貪為他男子所觀更相婬汙遂種罪根故禁之耳佛言正使人萬劫中熟觀美女能使美女媚好損滅不正使男女俱相悅色對共相視身不相到能有損益不耶愛色增獄苦離色無憂患妻為鋃當子為杻械舍為牢獄財為繫閈是四為地獄種無著乃解脫離愛則近道近愛增苦本婬樂自纏如蠶作繭黠者能解婬縛不婬除眾苦心念放逸行見婬以為淨恩愛意熾盛從是造獄牢覺意滅婬火常念欲不淨從是出獄牢能斷老死患愛欲自覆蓋自恣可情意自縛詣獄門如魚入鉤口為老死所司一日過去人命稍盡譬如牽牛向屠牛舉一腳稍近死地可哀無救人亦如是寸陰以過人命亦減人生則有死對強健則有病對丁壯則有老對四怨共居苦皆從愛欲生一由愚癡二由貪婬三由瞋恚除此三者四怨則滅無復生老病死痛得長解脫無憂患長者意解即得道迹前受五戒為清信士愛縛以解獄苦以滅死昇梵天長者告諸美女吾已得道意已離汝從汝所宜吾不拘汝五百美女皆得道迹發於無上正真道意求作沙門聖眾比丘僧皆言不聽此人大好若聽為沙門罪人不少長者聞五百美女發意亦甚歡喜長跪叉手白佛言願垂大慈聽為沙門五百女人解身瓔珞珠寶散佛上及菩薩大弟子上化成寶蓋其一寶蓋下有一化佛皆言聽為沙門於是五百女人頭髮自然墮袈裟便著身以成沙門其女歡喜化成男子皆得阿惟越致五百沙門繞佛七匝頭面禮佛足下並大弟子眾報恩已訖歡喜和顏悅色叉手長跪白佛言請問四事所疑若見聽者乃敢發問佛告五百沙門自恣所問佛當為汝解釋所疑五百新沙門俱同一念白佛言我等蒙佛重恩今得過度出於死地還見四事人及鳥狩身神一等受形不同狩著甲戴角鳥角作啄我等何緣去女為男願釋所疑佛告五百沙門諦聽內著心中狩所以著甲戴角皆由宿命種行致之前世為人時喜著木屐入寺舍講堂及沙門房中死後入地獄燒地熱如赤鐵其足到地皆燋燃盡毒痛不可言積數千萬劫罪之未盡故使不死死復入鐵刃獄足行其上地生鐵刃利如剃頭刃人走其上斷趺折骨亦積若干億萬劫罪竟從地獄中來復作著甲狩戴角者喜著步搖華樹巾角持頭觝觸人死後入大鷲獄鷲立人兩肩上嘴如鐵錐啄人頭發骨食腦積不可計劫乃復得出為戴角蟲鳥所以著角嘴者平生為人時喜口強辭寬傳舌闘亂盲人死入鐵鉀獄獄鬼燒鉀正赤以鑠其舌復燒鐵鉤正赤鉤有三刃利如鋩獄鬼以鉤鉤斷其舌復以利刃削其舌細如縷舌適還生復以犁耕之復以燒鐵杵刺其咽中罪過未盡故不死積不可計劫形竟得出為鳥以角為嘴若說君主師父其罪未殃墮五不請佛言汝所以於佛前去其女身為男子者惟昔定光佛之時國中有一梵志字彌蘭博學多知國中儒學者皆師仰之梵志彌蘭常將五百弟子以為左右常修梵行時適講堂菩薩過之一一解釋經中要事令五百人各得開解終日竟夜門徒皆悅菩薩捨之而去後日同時俱見錠光佛佛授菩薩決五百梵志亦發無上正真道意爾時受莂菩薩者今我釋迦文身是爾時彌蘭者今長者優多羅身是爾時五百弟子者今汝五百沙門是雖修梵行恣態不除故受女身宿師相遭結解得成男子汝等五百人卻後十六中劫當得作佛號寶手如來至真等正覺明行成為善逝世間解無上士道法御天人師號佛世尊共同一字國名妙樂人民熾盛但有菩薩眾無小道證其佛住世十有六劫像法亦住十六中劫其時國中豐熟快樂難量佛說是時三十萬比丘得不退轉四十億菩薩得阿惟顏九十億天人皆得無所從生法忍八千清信士求作沙門佛即聽為沙門十萬凡士七萬凡女前受五戒六十億清信女皆得柔順忍二十萬比丘皆發無上正真道意二百萬天人亦發無上正真道意恐畏長者白佛言我身更是千痛萬毒已遍今欲遠避之何等為五不請罪何等為十不救罪何等為五無竟罪願佛加恩解說佛告恐畏長者受持勿忘五不請罪者惡意向佛破塔壞佛像盜三尊財物闘亂比丘僧證入師父罪為臣不忠為子不孝弟子不謹慎師為弟子除殃滅罪教去惡就善恩倍於親百有餘分然弟子不深解經律藏濁眼觀其外動記師過若師有實事弟子悔過師為咒願其過得除師無實事弟子罪重師雖以佛故慈心療救弟子天網以設不得赦三尊極尊度人無量而誣謗之父母生之膝下推燥居濕慈感神祗血化為湩乳哺養育至其長大教詣師氏禮義成之其恩重天地而更背恩不奉父母君主仰授能令人尊貴能使人貧賤能殺人活人而反不忠天下有三大難事何謂三大一曰佛法眾師二者父母三者君主王侯得歎其善不得說其惡罪成不可救恐畏長者白佛言君主父母師友有過我欲諫之云何佛言大善大欲諫者自可諫君及父母耳雖爾當詳審其事乃可諫師有可諫者不可諫者已知得道者不論未得道者有二輩一者憙行來不畏禁戒數見犯法者亦當詳審審諦乃可𢉝處竊諫三過不止當自引不直悔過而退不得轉為他人說二者守戒畏死兢兢念道出入少尠不數犯禁如是內外無過缺雖時有過失或欲戒人或知人有過不得噵說故深求佛意漚和拘舍羅度人是輩不可諫但當自責我曹弟子曰弟子中誰有不如法者願尊師當為我曹罪戾之人原除罪事師曰弟子盡來即具香火師問弟子卿戒淨不戒淨者燒香禮佛佛言戒淨懺悔而退戒不淨者首過如事說師當教悔過過乃除滅不實守萬劫罪不除是為五不請罪十不救罪一者貪無厭足二者婬無厭足三者瞋恚難諫曉四者愚癡所為無道難與共語語之正事反引邪事為喻不信正法五者嫉惡他人六者憎妒他人七者主求他人短不自見過八者禁固他人使不得聞經行道布施為福九者不信罪福十者習惡不止是為十不救罪五無竟罪者一者殺生心口念殺受罪無竟二者貪利劫盜心貪意念受罪無竟三者婬嫉無厭受罪無竟四者兩舌惡口妄言綺語傳舌相闘受罪無竟五者嗜酒貪味勃亂無禮受罪無竟是為五無竟罪恐畏長者白佛言人處世間甚為危險度世大難我甚憂怖唯有作沙門閉房自守不豫世事雖不得道足免苦地我今年已過妻兒累重情中戀戀生相棄復劇這住家眾罪日滋云何自度佛告恐畏長者汝乃能自憂度世道能減我憂何甚快汝今遇大福德遭值佛世尚復可可耳乃得復聞淨度三昧其福功德無以為喻十方須彌山段段解稱量可知斤兩銖數十方各十萬恒河沙佛剎海水可量知斛斗升合數其聞是尊經三昧歡喜奉行如法者其福尊無比是皆非凡人行如中事不失毛分者尊過十方天上世間德無能與等者汝莫憂行者得度雖不能出家作沙門居家亦可修道堅持五戒行九齋使如齋法齋日詣塔寺受齋蕩滌六垢論講道化求度世道自可得度何憂之有耶恐畏長者白佛言我所居處去王舍國五百里遠田既無塔寺亦無沙門佛行度人非一處住我翼從三十餘人我年復老或復小弱不能行遠道者既到塔寺行齋一日妨廢五日所得既少所損甚多目月久長於生死意久則疲厭墮落續入惡道當云何佛告恐畏長者人身難得度身急事人來生時不手將妻子來也死去亦不將去我且非我何況妻子財且自憂身身自未度那何度他人自不能泅莫負他渡水兩死水中耳自未能得度戀念妻子枯並不度求道身中急事也男女各自當盡心敬意不避勤苦乃可免難自作自得不與他人計日疑難也若彼聚落賢眾少不能起塔寺居沙門者當棄頑闇之群馳就賢者之眾孩兒可度何況成人任戒者八歲男十歲女可行千里各自有腳欲求度身不當疑難恐畏長者白佛言已解居聚落無佛弟子但有俗人我當從業移近善友塔寺我自得其福阿難白佛言是尊三昧度人乃爾眾生之類有識之屬莫不得度者尊巍巍諸經中最眾行之首立道之元百福之王尊妙乃爾名為何經云何奉持佛告阿難是經名斷諸苦本一名總持諸法門三昧又名淨度三昧度諸天人民鬼神龍阿須倫下及三塗莫不度脫淨諸情淨三界故名淨度過去諸佛皆奉行是淨度三昧自致得佛現在諸佛從是三昧自致得佛當來諸佛亦當學是三昧從中得佛當奉行之阿難供養是三昧復當過於六度阿難是經從生死大難中拔度眾生恩重不可量阿難當念報恩阿難諷誦說是經處魔皆愁毒劇如人一朝亡失妻子父母財產寶物身復在牢獄號哭愁毒如是魔恒司便欲斷是法當堅持之勿為魔得便阿難我滅度後當廣為一切諸天人民布露演說令得度脫如我今日阿難我周遍說法一人不度終不捨去阿難我般泥洹後末世時人少有信佛奉行經戒者倚法倚界難名設有奉法者皆言是狂人耳一日不作百日不食云何不作正使沙門萬萬未有能樂戒究竟者也阿難白佛言人道難得已得為人復得聞佛經戒何故不精進佛告阿難有四輩弟子無本心故不精進何謂為四一者家居貧苦來受佛戒冀望富樂二者疾病來作佛弟子趣求一時利三者強教人來受佛戒四者聞作佛弟子後脫地獄可得生天謂直一受戒後得所願不知行之委曲是為四輩人愚癡不曉求後世濟神離苦唯求目前利其人既不精進乍前乍卻反為魔得便所向不偶謂呼受戒反得其殃不知自行違所致用無本心故復有四輩人能精進一者畏三惡道二者從人道中來三者從天上來四者從他方佛國來便能精進沙門亦有四輩無本心不承至法一者避世間苦來作沙門二者避官役來作沙門三者不能得衣食來作沙門四者避病來作沙門無本心故不能精進亦不能免三苦復有四輩人作大精進一者念生老病死痛二者宿世沙門中來三者天上來四者他方佛國來乃能精進我般泥洹後千歲欲末若有沙門若清信士中有守戒精進如律行者此非凡人或是文殊師利或維摩詰或惠法大士或陀和菩薩或彌勒輩示現作沙門建立懈廢之人清信士女中有能殷勤齋戒死死不缺犯者亦他方上士或罪謫來生閻浮提或因緣來生閻浮提亦非凡人也阿難白佛言弟子於閻浮提五燒五毒愁苦之世眾雨之中奉行淨度三昧一日一夜其福何所為喻佛告阿難若有菩薩起七寶塔滿閻浮利作七寶講堂一一堂上施設金銀水精流離車渠馬瑙珊瑚真珠作床坐床綩綖坐具遍諸床榻上繪綵華蓋燒好雜香澤香搗香供養百劫其福寧多不阿難言甚多甚多天中天佛言不如活一人福倍多阿難不可為比活滿四天下人不如自守一日福倍復倍相去甚遠不可為譬喻人能於是五燒毒燃之中清淨自守齋戒如法一日其福隆盛轉身得度不久阿難白佛言若弟子中有精進如法者後自可度不須師耶佛告阿難弟子精進雖足免難非師不度師為重任如人生無父母難名又無所寄屬云何名字之阿難白佛言如佛言者末世時弟子皆共更相放效不奉律行已為廢棄尚不能自度何能度弟子佛告阿難人欲求度世道者當求明師譬如人欲渡海當隱視船為可任用不足能到彼岸不船師為本船師不為新來也船完堅師本故師便可度無憂船有不牢師復新人如是者不可強度當觀師戒行完不堪任我師不我行可師意不我中師弟子不師為有律行不師法難易耶我能堪任奉事師不我為能持師戒不若觀中師者當奉敬如事神明當護師意師為我曹故勤苦我曹亦不當於師有所愛惜當知師性所喜不喜語言不得觸師諱傷師意師意微恨後成大罪慎之慎之是為求法阿難白佛言末世之人不用正化律行者少國中無持戒律者可止不作佛弟子不人身難得一爾當更劫數云何佛告阿難經法所到之處時時往往有持律行沙門出繼佛種不絕域中凡有若干億萬菩薩弟子若干億萬清信士女十方諸佛一日一夜各三時放道眼普視諸天人民幾許精進幾許不精進幾許為俗幾許為道幾許為惡幾許為善佛盡知之從五戒上至具戒入律行者十方佛悉皆稱譽受作弟子不入律行者十方諸佛亦自不受是為棄人耳是故四部弟子當念精進晝夜各三時禮拜首過雖不能日日三時禮拜莫失齋日勤修講誦淨度三昧信樂受持眾垢漸少心明意淨稍近泥洹若人布施萬億劫不如一日諷誦是三昧其德出彼福上施萬億劫心無懈倦想不如讀是經一竟思惟解慧其德正直等是經累汝阿難是經度人無量阿難是經中有大尊天神與是經俱爾時四天大王自與眷屬俱白佛言是經所在之處我自擁護持經之人第二忉利天帝釋與諸官屬俱白佛言若後有善男子善女人執持經卷者我自護是善男子善女人鹽天兜率天不憍樂天化應聲天梵天大梵天梵輔天上至不入慧天等皆白佛言若善男子善女人信樂執持是經卷者我自護是善男子善女人諸天結願已各作禮而還佛告阿難如是經卷所止之處當令有五清淨一者枰閣令清淨二者掃灑令清淨三者香火供養令清淨四者讀是經當用鮮潔手巾五者齋戒清淨無食葷辛是為五清淨初聞是經者心意不堅魔憙亂欲斷是經法讀是經時若男子若女人持異種不好語來聞善男子善女人耳者不當受當逆呵之卿欲亂我意耳受者魔已深入為魔得便知是善男子善女人不久得聞法聞亦不能究竟以為魔得便以失善師意師與第子已有瑕釁師案法律行事沙門欲得情淨無勞垢者一時一從則無塵勞久則生垢敬意以盡慢意以生兩不得福俗人不知清信士女法清信士女不知沙彌法沙彌不知沙門法展轉不相知行事不能承用法教者但種罪根俱墮惡道不如早解後可無對佛說經竟諸天阿須倫鬼神龍王地獄官屬國王臣民四輩弟子不可計菩薩眾莫不歡喜作禮而去方廣錩修改審定附淨度三昧經的編纂與撰述齊藤隆信序言北魏編集的淨度三昧經以下簡稱淨度經寫卷現分散保存在中國英國俄國和日本此次通過錄校該淨度經之全貌得以呈現由此也就可以提出諸多問題諸如敦煌石室本與日本傳承本第一卷卷末部分的不同與提謂波利經的關係曇曜與曇靖的交涉竺法護所譯諸經之辭彙對本經的影響中國思想特別是道教的影響對當時民眾佛教的思考及要求可與此對應的教團的佛教意識六朝漢語的語法等等雖說這部經典包含了如此眾多的問題但此處僅擬考察淨度經的編集者創作這一疑偽經時所使用的方法編纂與撰述所謂編纂指引用已經翻譯的佛典及現存的外典中的文字重新加以排列所謂撰述指作者撰寫的表述自己獨立見解的文字一編纂對鳩摩羅什以後翻譯出來的失譯經典而言通過考察它受哪些譯典的影響來確定其譯者這是很困難的而疑偽經則可相當明確地查出其出現年代及其從特定譯者譯典中摘引的引文即編纂這不僅因為在辭彙語法方面有迹可尋還在於它往往整句整段地引用別的譯典這是疑偽經編集者必定要做的工作可以這樣說這不僅是淨度經也是大多數疑偽經共同的特點一從竺法護所譯經典的引文假設淨度經是由北魏沙門統曇曜等組織撰述的則它可能出現在五世紀後半葉北魏於大延五年統一中國大陸的北方後鳩摩羅什翻譯的佛典自然也傳到了平城但我們現在從淨度經中看不到有鳩摩羅什所譯經典的辭彙的影響相反可以看到很多在古譯中出現的辭彙其中特別顯著的是西晉竺法護譯經時間為西元年年使用的辭彙雖然也有相當多安世高以來使用的佛教用語或漢語辭彙但下面提出的這些例子只能歸於竺法護在此先列舉淨度經中與竺法護所譯經典具有共同特徵的例句世尊現變感動魔眾盡一佛境界天地六返震動佛悉愍傷放白毫相光往而安之光明徹照三十三天下照十八地獄極佛境界疆場左右莫不歡喜尋光即到佛所淨度經卷第一在竺法護譯月光童子經中有大體相同的表現法時世尊放大光明上照三十三天下徹十八地獄極佛境界貪為死徑愚癡為泥塗沒溺不得出嫉妒為罪本貪利為自衰老不止婬夙夜不學有財不施不受佛言有此八者為自欺身放逸入三塗百罪從心生淨度經卷第一在竺法護所譯四自侵經中有夙夜不學老不止婬得財不施不受佛言是四出心還自侵身淨度經列舉了八種在五道中輪廻不止的理由其中四種即四自侵經中所論述的還有四種是另加的有此八者為自欺身放逸入三塗百罪從心生心為泥洹君道在身中自心致之不從他人求何有難乎從他人得者爾乃為難心之出入往來無門周流遊洋住止無處淨度經卷第一上文之依據應為竺法護譯修行道地經卷三之當作是觀疾速成就真如泥不從他求自因心致從他人得乃為難耳由己勤獲何所難乎如來至真等正覺明行成為善逝世間解無上士道法御天人師號佛世尊淨度經卷第二卷第三上述佛號中的明行成為道法御是竺法護譯經的特徵不過曇曜吉迦夜譯經也有這種用法三潤之法水洗心垢穢心淨得度一切眾生擾擾但諍咽唯不急之事萬罪還自纏繞或相害傷忿怒成仇皆由貪生競諍利欲群迷雷同不識道義老死日加常與罪對溺于五陰六衰侵漏三苦受罪無竟淨度經卷地二上文與竺法護譯四自侵經之一切擾擾紜紜但諍咽喉唯不急之事禍從口出千殃萬罪還自纏繞或相害傷忿怒成仇皆由貪生競諍利欲群迷雷同不識道義之真俗偽之惑老死忽至正相符合愛色增獄苦離色無憂患妻為兩當子為扭械舍為牢獄財為繫閉是四為地獄種無著乃解脫離愛則近道淨度經卷第三上文與竺法護譯生經卷第一之棄家牢獄鐺扭械想著妻子而自繫縛相當下面摘引若干與竺法護譯經共同的辭彙羅網顛倒羅網佛典中提及羅網一般是指佛國土的莊嚴具捕魚鳥之類的網有時喻為防止犯罪的法律但這裏泛指煩惱係從捕獲魚鳥的羅網這一意義衍生指煩惱蠱惑並束縛身心有時亦指疑惑含毒平生為人時含毒嗔恚另兩例略從毒蛇毒蟲害人之事派生指危害他人的人與嗔恚為同義詞自用心懷嫉妒憍慢自用另一例略意為聽不進別人的意見傲慢自大若干域中凡有若干億萬菩薩弟子若干億萬清信士女另八例略該詞在安世高譯經中經常出現在現代若干一詞意為數量較少但正如陰持入經之陳慧注稱其事多故曰若干也古代將數量較多稱為若干該詞本來表示數目不定但佛典中幾乎無例外地將它與大數接續使用如無量若干若干億萬不起法忍二十萬比丘逮得無所從生法忍百萬天人得不起法忍另一例略在淨度經的上述例子中不起法忍與無所從生法忍似乎不同實際兩者同義道迹二百清信女皆得道迹另五例略安世高以後將須陀洹譯作溝港道迹竺法護的用例甚多反復但治惡逆無行無義不信三尊無反復另一例略指不返報雙親師尊的恩義亦寫作返復反復在疑偽經中甚為常見放心行來至趣放心恣意另三例略放縱任性之義獨步滅三界苦除五處籍獨步無畏無與倫比突出的意思為所見為五道主所見錄籍生死名不除被動語法如又有坐何等而見考治我許親愛是身謂是我許與我所我所有相同許所自古互用更樂為名色六入更樂痛癢思想生死識五陰六衰所誤亦譯作觸細滑粗細細所更更所觸也作為動詞表示經歷體驗等進而轉訛為情況生活存在等阿惟顏坐中萬菩薩皆得阿惟顏另二例略該詞在竺法護譯經中經常出現意為一生補處常寫作阿惟顏一生補處有時亦作阿惟越致但毗羅三昧經卷下謂王曰阿惟越致與阿惟顏有異不居士言明有異也可見亦有其他解釋往來道五道大王與眷屬具足得往來道與斯陀含道同對人生則有死對強健則有病對丁壯則有老對另十三例略意為惡報沮渠京聲譯五無反復經謂人生受死物成有敗善有善報惡有惡對可知報為善報對為惡報因此所謂對即為過去罪業之報偶財物不聚所向不偶死入地獄另一例略此處之偶即諧偶偶為如願以償之意諧亦有順利地如願以償之意侵欺五者持齋不完為自侵欺亡失大福另二例略淨度經中的三個例子均作自侵欺竺法護譯經則一般作侵欺自侵參見四自侵經六情蕩滌六情之垢漸近清淨另三例略安世高以來的古譯時代將六根譯作六情正使正使出家持十戒作沙彌亦不應共坐起飲食另四例略表示假設讓步竺法護常用五毒治之其賊有罪王收捕著獄五毒治之另一例略淨度經中又有五毒治人五毒意為五種毒藥五種酷刑或刑具這裏相當於後者乃爾善哉善哉憂念人民乃爾另二例略如此之意一般置於句末竺法護譯經中多見如佛昇忉利天為母說法經卷下如來威聖道德之光不可稱盡巍巍神妙乃如是也佛為法師聖尊無限神妙乃爾逮得二十萬比丘逮得無所從生法忍同義複合動詞在淨度經中接續在逮後面的同義詞還有逮獲逮入逮致逮成逮及意為達成成就至得細滑為色聲香味細滑所誤另二例略與觸同參見更樂項竺法護喜歡用細滑畫瓶內盛臭處外強文飾身如畫瓶將肮髒的人體比喻為鮮豔的彩瓶竺法護譯四自侵經謂身如畫瓶內滿不淨臭處膿血猶如革囊這裏的革囊意義相同噓天推步隨六情逐世榮名噓天推步尊身重名虛偽無信七寺本原文作噓夭稚步據諸經校正噓天源於莊子齊物論之仰天而噓問題在於雅步邪步推步三者到底何者正確如為雅步則因竺法護生經中有安詳雅步舉動不暴就其文字看是一種褒義的用法如為邪步與上下文雖然相合但因諸本不同所以很難取捨如為推步則意為推算天象曆法因四不可得經中有不識天地表裏所由的說法則這裏是也可能指愚人明明不知道天地形成的道理可為了追求世間的名譽硬去推求行星的運轉無論如何從淨度經中的逐世榮名及其它經典中的有關詞句看這四個字應意為企求名譽與地位貪求世間的稱譽堪任若又不堪任清淨戒者不當自極強另二例略同義複合動詞堪任都是擔當的意思按照其能力或條件可以接受並實施某任或負擔籠戾人從三惡處來生者為無反復籠戾難化那雙聲詞一切經音義卷六七釋作剛強難調伏世八事捨世八事利衰毀譽稱譏苦樂動搖人心的世間八種事項即八風狐疑與共俱行恐人眾觀狐疑不決意為象狐狸那樣懷著疑心竺法護譯經中常用且常與雙聲詞猶豫並用空無相願入八聖諦空無相願死得泥洹指空無相無願之三解脫門竺法護為了縮略句型經常無願中的無字省略推燥居濕父母生之膝下推燥居濕指父母對子女的恩情即父母讓孩子睡在幹的地方自己卻睡在孩子大小便弄濕的地方後漢書卷四五楊震傳永甯元年條稱奉養聖躬雖有推燥居濕之勤前後賞惠同書卷八一獨行傳謂親自哺養乳為生湩推燥居濕備嘗艱勤另曇曜吉迦夜譯雜寶藏經作推幹去濕得便受者魔已深入為魔得便另三例略乘虛而入抓住之意竺法護佛說弘道廣顯三昧經卷四以為眾魔及官屬並邪外道之所得便常在羅網結疑中支婁迦讖開始有這樣的用法在十往生阿彌陀佛國經等傳為安世高所譯經典中亦較常見也寫作伺便建立現作沙門建立懈廢之人竺法護常用辭彙在建造塔寺等建築物以及成就禁戒功勳等場合亦用二與竺法護譯修行道地經地獄品的對照淨度經卷第一所說的三十個地獄中從第二個到第十六個與竺法護譯修行道地經卷第三之地獄品第十九所說地獄的順序辭彙內容都相對應第一個地獄及第十七個地獄到第二十三個地獄則與東晉曇無蘭譯泥犁經及鐵城泥犁經中所說的八地獄的順序內容對應各個經典中都有關於地獄的描寫但只有上述三部經典與淨度經的三十地獄相對應在此列出他們的對應關係淨度經之三十地獄泥犁經及修行道地經之八大地獄阿鼻摩訶泥黎阿鼻摩泥犁經一黑繩地獄黑繩修行道地經一鐵臼獄合會修行道地經二合會獄同上太山獄同上火城獄同上劍樹獄鐵葉修行道地經三嚾吼獄同上八路獄同上刺樹獄同上沸灰獄同上無相當沸灰修行道地經四大噉獄叫喚大叫喚修行道地經五六大阿鼻獄阿鼻摩訶修行道地經七鐵車獄同上鐵火獄同上沸屎獄沸屎修行道地經八地燒獄鳩延泥犁泥犁經二彌離獄彌離摩德泥犁泥犁經三山石獄崩羅多泥犁泥犁經四多洹獄阿夷波多洹泥犁泥犁經五黎洹獄阿喻慘波犁洹泥犁泥犁經六飛蟲獄熟涉務泥犁泥犁經七湯河獄檀尼愈泥犁泥犁經八如上所示淨度經的編纂者顯然摘引了竺法護譯經的辭彙與文句那麼為什麼曇曜這一撰述集團受竺法護譯經如此強大的影響呢這應該聯繫竺法護譯經的流傳及淨度經與提謂波利經的關係來考察起碼現在可以肯定的是竺法護譯經涉及的範圍廣泛翻譯的數量也是古代最多的他所翻譯的大多為大乘的主要經典翻譯活動至少長達年以上年年從傳記可知他具有一定的經濟實力擁有相當大規模的教團以此為基礎從事譯經寫經事業因此他譯的經典廣泛弘通於南北以致僧祐這樣說凡一百四十九部孜孜所務唯以弘通為業終身譯寫老不告倦經法所以廣流中華者護之力也給後世以巨大的影響竺法護譯出的經典名稱中有三昧兩字的很多所以我們甚至可以說編纂者編纂淨度三昧經時就是以竺法護所譯諸經為模板作依據的三其他經典外典姚長壽在淨度三昧經與人天教一文中指出淨度經引用了不少後漢曇果康孟詳所譯中本起經及吳維祗難所譯法句經特別是對法句經的引文值得注意另外蕭登福在敦煌寫卷佛說淨度三昧經所見的道教思想論及被淨度經採納的道教思想在此列舉被姚文漏提的有關法句經的引文及從其他經典中摘引的文字老不止婬夙夜不學有財不施不受佛言有此八者為自欺身淨度經卷第一如前所述該句引自四自侵經但法句經卷上也有晝夜慢惰老不止婬有財不施不受佛言有此四弊為自侵欺其罪未熟至其熟時自受其殃貞良現禍以宿福薄為故世罪所追遣逢宿怨對至不救福未熟至其德熟自受其福淨度經卷第二法句經卷上有妖孽見福其惡未熟至其惡熟自受罪虐貞祥見禍其善未熟至其善熟必受其福為其依據不如獨行獨善無憂奚用伴為淨度經卷第二法句經卷上有學無朋類不得善友甯獨守善不與愚偕樂戒學行奚用伴為獨善無憂如空野象似為其依據心者心不見心有心不知心淨度經卷第一支婁迦讖譯般舟三昧經卷上行品第二有心者不知心有心不見心與上述引文見知互換但意義不變敦煌本淨度經本句作心者不見心有心不知心良藥苦口以愈百病苦言逆耳以利身行淨度經卷第二這是淨度經勸誡守戒沙門的話韓非子外儲說左上有夫良藥苦於口而智者勸而飲之忠言拂於耳耳明主聽之史記留侯世家史記淮南王傳有忠言逆耳利於行良藥苦口利於病另外說苑正諫孔子家語卷四後漢書袁譚傳吳志孫奮傳等也有類似的文字乃可處竊諫三過不止當自引淨度經卷第三意為師如有過弟子應在避人處勸諫三次如仍然不聽從方可引退禮記曲禮下謂為人臣之禮不顯諫三諫而不聽則逃之子之事親也三諫而不聽則號泣而隨之又禮記祭義父母有過諫而不逆論語里仁事父母幾諫見志不從又敬不違勞而不怨史記日者傳賢之行也直道以正諫三諫不聽則退當父母恩師有過錯時兒子或弟子應該秘密地勸諫三次不得違逆如勸諫無效才可以默默離開本經在這裏體現的是在正義與恩義的夾縫中因儒家的敬上精神而產生的煩惱一日不作百日不食淨度經卷第三史記卷四三趙世家肅侯十六年條有肅侯遊大陵出於鹿門大戊午扣馬曰耕事方急一日不作百日不食肅侯下車謝意為一天放鬆農業勞動一百天沒飯吃淨度經的引述意義略有不同下文再作論述我們在上面考察了淨度經的編纂疑偽經的作者當然要從事編纂從上述考察我們可以看到疑偽經編纂者周圍存在著哪些典籍以及他們對哪些典籍感興趣二關於撰述一關於思想內容關於這一點請參照中島隆藏的淨度三昧經中的轉迷開悟思想大內文雄所撰淨度三昧經題解及姚長壽的淨度三昧經與人天教本經的主要內容為勸導在家信徒持八王日與九齋三齋與六齋參拜寺塔其中貫穿了三十地獄說善惡報應說詳細敘述了現世有諸天神隨時在身邊守伺及減壽奪算來世生天或下地獄等師事明師弟子精進雖足免難非明師不度批評出家僧人和上閑居但思美食好衣不知我曹官私百事不可諧活自度佛實不度人人自度耳等從而勸導在實踐上應齋日持戒二關於淨度經三十地獄說之撰述考察淨度經編纂者怎樣撰述這才是最重要的因為這才反映了編纂者的編纂意圖淨度經引用翻譯典籍及非佛教典籍時既有原樣照引也有改變文意將他們組織到完全不同的行文中通過這種變動咀嚼或改篡所形成的部分既相當於撰述在此僅就三十地獄說明如下四點修行道地經泥犁經鐵城泥犁經中各有八個地獄淨度經的編纂者將上述八地獄合計為十六地獄細分配置為二十三地獄淨度經中一一明確記載了主宰地獄的獄主的名字三十個地獄三十個王而在修行道地經泥犁經鐵城泥犁經中沒有這些獄主的名字修行道地經泥犁經鐵城泥犁經中對地獄的詳盡的描寫在淨度經中被簡化但明確指出墮入這些地獄的原因亦即生前的具體罪狀以說明因果關係淨度經對生前的罪狀的論述不是任意的而是有著重要的意義其重要性甚至超出對地獄本身的描寫它使那些不能反省自己罪惡的人通過這些論述即具體的各種各樣的墮入地獄之原因瞻顧自己將來墮入地獄的前景在此存在著佛教的人性佛法的實踐也從這裏開始淨度經的編纂者擬通過這些論述這些具體的墮入地獄的原因是人的身心所犯的各種佛教所謂的罪惡亦即人間一切罪惡讓人們知道無論是誰身上都存在著某些類似的罪惡為了上述目的他們綜合諸經中的地獄說描繪出自己的三十個地獄其實詳細地敘述墮入地獄的原因這並非淨度經所特有而是疑偽經的一般特徵這是為了讓人們追求有道德的生活因而反復強調地獄及其相應的墮入地獄的原因由此制止人們滑向罪惡淨度經的三十地獄中第九第十五第十第十九第二十九等地獄都是在齋日不能認真持齋的人所墮之地但修行道地經泥犁經鐵城泥犁經等經典中沒有談到齋日與持齋等事項第九八路獄坐齋日相使破壞法橋損眾生強教人犯禁故致斯殃第十五鐵火獄坐不持齋戒惑心持齋腳行以致斯殃第十七地燒獄坐入律戒不能忍坐數行來白衣舍齋日腳行來害眾生所致第十九山石獄坐八王日不行道心雖念善足行遊逸令六神飛揚天官所察以致斯殃第二十九燒石獄俱坐無戒食人信施食不持齋戒斷絕人福以為己有之所致以致斯殃前面提到淨度經論述的要點是齋日持戒這一點在此也得到印證也就說淨度經的作者從修行道地經泥犁經鐵城泥犁經取材進行編纂時將淨度經的中心意思齋日持齋編纂在其中這種迹象說明淨度經編撰時不是按照藏經而是按照編纂者的編纂意圖進行改訂敷衍而這正是編纂疑偽經的意義之所在通過對疑偽經撰述部分的認真考察可以瞭解該經典的中心主張三關於典故六朝文有各種各樣的修辭手法其中之一是用典亦即在自己的著作中引用古聖賢的語言及經典史書中的名句從而加強權威性與說服力這既適合六朝文人的嗜好也反映一種尚古精神也就是說用典是當時知識份子的標準也是文章成功與否的標準當然他們沒有注明這些典故的出處在現代如擅自借用別人的意見立即會招致責備古代自然完全不同這是無從比較的在此想指出上述這樣的用典等於編纂並非六朝文的專利六朝時期的疑偽經也是這樣這大概是因為疑偽經的編纂者與六朝的文人有著相同的意識所以也採用用典這一修辭法首先就權威而言這裏可以提出對譯經辭彙的襲用例如沿用特定的翻譯者所用的譯經辭彙可以將該疑偽經裝扮成翻譯經典這裏必須避免原封不動地引用非佛典的文章以免顯露馬腳不過如僅僅限於辭彙則沒有問題因為翻譯經典也大量使用中國的傳統辭彙特別是儒家與道家的用語要取得翻譯經典的權威必須要瞞混過經錄編纂者的嚴厲的眼睛疑偽經取得這種權威後便可以作為真經被著錄下來並能傳之未來其次就說服力而言用典的好處是只要借用古籍中的一句名言便可以正確地表達出自己的思想而且對於嗜好尚古的漢民族來說對讀者也給予了充分的說服力所以用典是非常有效果的例如前面所說史記的一日百作百日不食敘述的是農業及能夠帶來收穫的農耕這一現實問題淨度經這樣引用這句話阿難我般泥洹後未世時人少有信佛奉行經戒者倚法倚界難名設有奉法者皆言是狂人耳一日不作百日不食云何不作正使沙門萬萬未有能樂戒究竟者也上面這段話的背景是佛在向阿難託付流傳佛法的重任時對佛滅後眾生情況的一種敘述這與史記原話的背景完全不同與農耕毫無關係是從修道及其應得的果報的角度來說的與其說它針對現實問題不如說它是對未來眾生的教訓這一文句由於能夠確切表達編纂者的意圖於是作為名言從史記引入經中淨度經從法句經及很多竺法護譯經中引用的文句可以說大抵如此無論是有意識還是無意識疑偽經中的這些用典反映了編纂者作為知識份子的修養我認為由此可以說它明確地顯示了這些典籍當時不是翻譯經典恐怕編纂者本人從開始就很清楚這一點但他們大概是出於只有用典才是名文才有價值才能吸引眾人注意並流傳開來這種考慮吧無論如何應該說疑偽經中的典故是編纂者以值得引用的佛言為教理以古籍中的名言名句為教理的輔助材料交叉引用內典外典而形成的也就是說疑偽經的編纂者為了權威性與說服力而用典這樣作為六朝文特徵之一的典故與疑偽經中的用典編纂就其作者的意圖而言是大體相同的今後有必要對疑偽經中的所有的用典編纂及撰述展開進一步的調查最終的結論將在調查後得出接著想談的是六朝文的用典是該文的裝飾但疑偽經並非文學作品無意義的裝飾反而有副作用翻譯經典與疑偽經一般確用四六文來美化這大約是出於讀誦的考慮但超過限度的裝飾性翻譯在當時就受到批評為正確傳佈佛陀的精神為目的而編纂的經典討厭過分的裝飾這一點在翻譯經典及偽裝翻譯的疑偽經中是相同的所以疑偽經中所見到用典與六朝文中作為裝飾的典故可能有若干不同結束語疑偽經並非從零開始它吸收某些翻譯經典的結構辭彙甚而思想仿照翻譯經典而撰成也就是說它一方面採用翻譯經典的語文與結構編纂一方面組織進編撰者的編撰意圖撰述而形成那無非就是折中印度與中國而形成的編纂撰述經典或述作經典這從僧祐的出三藏記集卷五之新集疑經偽撰雜錄第三中所說的或憑真以構偽或飾虛以亂實可以得到證實前一句批評的是編纂後一句批評的是撰述它簡潔地說明了疑偽經具有的特點淨度經等眾多疑偽經將翻譯經典及外典的文章辭彙思想按照編撰者的意圖進行剪裁在此基礎上表述自己獨特的觀點這種假裝成翻譯經典的典籍自然有著隱蔽其疑偽經性質的效果也就很可能被當作翻譯經典而永久流傳方廣錩譯
