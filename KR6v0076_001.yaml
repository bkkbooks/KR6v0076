body:
  text: 聞如是一時佛在羅閱祗神鳥山中與大比丘眾俱比丘二萬五千皆阿羅漢神通已達脫於恐畏已過諸畏畏無所畏三脫無礙空無三昧無相三昧無願三昧其心空寂皆入空慧辯才無礙菩薩七萬八千皆住無畏三昧普光三昧有還淨戒三昧者已得不動三昧者已得了生三昧者有得法雨三昧者大尊明士漚和拘舍羅智積無限辯才無侶智度無極已藏七寶心空無礙淨如水月無心意識已脫死地度無恐畏畏無所畏五眼明達觀三界五道轉化受形顛倒羅網圍繞罪福自追圍繞其身廻流不絕人物之屬有識之類沒溺愛海苦痛愁惱都無覺知而自謂為樂遭逢苦厄不知迷行致之而反怨天遂益愁憂毒心亂起噁心滋甚沒命經入三塗考治萬端五毒兼備受罪數千億劫形罪雖竟化成惡形更受百畜之身出一身入一身出一識入一識忘本識周旋五道終而復始輪轉無際廻流不絕目視三界生死苦畏為六欲所溺甚於須彌山沒溺大海無有出期雖爾天地衰老劫盡大燒海水幹竭須彌山猶有出期三界之群生為六欲所溺甚於須彌山菩薩大士觀見審諦愍傷愚蠢凶騃之人未見生死參差世尊開演正法恤化三界齊渡五道斷諸徑路滅生死火開虛無門安入泥洹宅現自在之制無我結解見生死之縛十二癡本六十二見令眾結解脫無罣礙世尊導化善安利業諸天人民菩薩大士輔佐世尊蕩除三界閉絕三塗開三善路世尊現變感動魔眾盡一佛境界天地六返震動人天易色魔眾一切鬼神龍阿須倫官屬悉感動不安諸天龍鬼神阿須倫等各各官屬皆自於所惶怖自歸命佛佛悉愍傷放白毫相光往而安之光明徹照三十二天下照十八地獄極佛境界薑場左右莫不歡喜尋光即到佛所諸天帝釋天子王女天上諸大尊神妙諸天神魔王及諸官屬司錄司命三十二鎮王柱天將軍特進兵王律法義都曰公科車赤符郎功曹使者天侯太一四天大王太子使者一時悉皆尋光至佛所稽首歸命皆禮佛足繞佛七匝禮佛訖懸住空中諸龍王阿須倫王將官屬尋光而至稽首歸命禮佛畢訖侍佛後面諸天神王釋梵四天王上至三十三天及諸天子輔天將軍皆持天上華香寶玉赤真珠摩尼珠辟玉金銀水精流離車渠馬瑙幡彩琦珍寶蓋名香雜香澤香搗香珍琦寶物盡天上所有賷持供養世尊及諸尊菩薩大弟子十八地獄皆悉休息監官屬皆尋光而至歸命稽首繞佛百二十匝叩頭悔過禮拜畢訖住佛右面地獄監官玄都王聖都王廣武王晉平王玄陽王武陽王公陽王平陽王廣進王都陽王延慰王平胡王璉石王水官都督鐵官都督天官都督仙官都督土官都督十八使者各將諸官屬尋光而至頭面禮佛足三自歸命悔過拜謝繞佛七十匝稽首而立國王洴沙將十億眾來詣佛所清信士清信女二百萬五千人皆來會坐凡人數千萬皆來會坐別坐左面聽佛說經時國人皆疾疫及臣民行惡凶危佛慈愍之恐墮三塗沒溺苦毒欲度脫之故還處靈鷲山現變感動無不蒙度佛告四部眾及諸天龍鬼神阿須倫閱叉真陀羅摩睺勒鬼神及閻羅官屬悉皆明聽各言唯諾唯諾今受佛教願聞聖化重哀教戒當奉行之佛言三界眾生食福無行還墮地獄含毒害生死入地獄論諂欺誑死入地獄貪利不止心懷嫉妒憍慢自用更相伺侯共相中害死入地獄中正相嫉佞諂相讎邪常自正死入地獄殺盜婬欺妄言兩舌惡口罵詈咒咀死入地獄飲酒迷亂食色嗜欲害生可口死入地獄慳食獨食死入餓鬼多諸瞋恚喜怒無時死為賤人負債不償借貸不歸持頭抵觸人後為畜生論諂後為鬼神無所倚屬種福多怒含毒瞋恚後則為龍蛇戒羸自尊好為人主五度不純死主地獄五戒完堅死則為人十善行羸生忉利天以下十善堅強好欲生六天以下一禪生色天二禪生無色天三禪不解空生二十四天以上不離於地獄苦一切諸身形類之屬各自從心生種行得之諸天人民作天行則得天身作人行則得人身龍鬼神平生為人時含毒瞋恚好著巾角叉樹是為龍行死則為龍作鬼神行則墮鬼神中作畜生行墮畜生中作奴婢行墮奴婢中作餓鬼行墮餓鬼中作地獄行則墮地獄忍辱得端正人所樂見瞋怒得醜陋恭敬得長且尊憍慢得矬小且賤種苦得苦種樂得樂作是得是不作是則不得是汝等各自種行隨行受報乃今有若干種類受形各異尊卑貴賤好醜長短不等者何由心所生心念不同故致是報諸天龍鬼神地獄王人民四輩菩薩摩訶薩聞佛所說正真大法罪福證驗實如世尊慈化之教形類各異諸神等無量各自本來身心各言受教奉行原除愚癡從今更始立行為本佛言能行四恩四等無相無願入空定立八正行八維務禪九次第禪除九思行十定法者則離生死得出三界不畏三塗之難履刃不傷蹈火不燒處欲不汙在禍不殃致平等覺舍利弗離坐正衣服叉手長跪白佛言諸天人民鬼神龍阿須倫閱叉真陀羅迦樓羅甄多羅摩睺勒餓鬼地獄飛鳥走狩識神一等行地不同志趣不齊罪福所應云何佛言眾生受形隨行獲其果報所墮之處各隨所習以致殃福文殊師利白佛言諸法本淨何因有罪有福法本無二心本本無寧有三也二千本無尚無一何況二也心無本心無男女心無大小心無尊卑心無若干心空空如泥洹空心如本無空心之無形其心為神舍神亦無形神神去法空空如神空神空如本無三界空五道空萬物空四大空地水火風空等無有異吾我空眼耳鼻口身心意識此八本空本來空本清淨色本空清淨痛癢思想生死識本空清淨吾我本清淨身心本清淨三界本清淨人物本清淨眼耳鼻口身心六事本清淨地水火風空本清淨青赤白黑本清淨文字亦空本清淨一切諸法空清淨般若波羅蜜本清淨三界如幻人亦如幻色痛癢思想生死識如幻五陰六衰亦如幻色生色死色起色滅無常如幻痛癢思想生死識識生識滅無常如幻生老病死無常如幻饑渴寒熱無常如幻四大非真色滅速朽皆歸無常計本來無色痛癢思想生死識亦本無吾我本無五陰六衰本無地水火風空本無諸法本無三界本無人物本無有我世無我世我所非我所本無有想無想本無有佛想住如故本無佛哀世故化現佛身欲還眾生使還神本無本無無住無來無去無捨無取無著無縛無生無死不存不滅寂若虛空不起不滅無增無減無苦無樂無憂不憂心法本無是為還神還歸本無譬如人遠客遊在他邦窮困積有年歲數在他邦犯事閈繫牢獄獄吏難惡酷毒掠治五毒兼備冀望意氣孤獨一身僑在他鄉身在獄中見閈保身無賈用外無知識父兄妻子遠在故鄉里既無知者受罪窮厄饑不得食困得脫出今復歸家身得安隱不乏衣食快樂無極人從生死恐畏生老病死痛地獄之苦而得歸還本無休神泥洹寧不喜耶佛言如是如是眾生從苦得樂從痛得愈從饑得飽從寒得溫從熱得涼從死得生從貧得富其人乃更諸苦各若干返然後脫此諸苦事事快樂其人寧喜不文殊師利白佛言其人前苦今樂甚大歡喜不可言佛言人出大生死得度至泥洹無為快樂無極所願已得心即從計所作已辦離諸熱惱無復生死神存自在長得解脫爾時大眾在坐者諸天人民聞文殊師利說本無時千比丘意解漏盡皆得應真八千菩薩皆得無所從生法忍八萬天人皆得不起法忍五千天人發無上正真道意八百清信士皆得歡喜忍五百比丘發無上正真道意六十比丘尼漏盡意解百萬天人得諸法法眼淨二百清信女皆得道迹說是法時大人八種聲上至梵天下聞三塗地獄餓鬼苦痛休息聞法寶音盡發無上正真道意畜生飛鳥走狩聞法之音心發善念畢此一身得人道者我當作沙門行佛道地獄王監官屬皆發無上正真道意天龍鬼神盡發慈心國中人民其得病者即皆歸命亦發無上正真道意文殊師利白佛言諸天人民群萌之類皆更三塗之苦今皆發慈心因其善心盡可得度佛告天人雜類心意識淨者便可盡度也佛即放身相光五色曄曄晃晃盡恒邊沙佛剎其見光者諸法法眼淨尋光得六法證盡入律行地獄餓鬼走狩飛鳥尋光發意願畢形壽得為沙門奉行清化當求佛道諸天人民皆得清淨戒凡人二萬二千皆得道迹求五戒為清信士女佛即許五戒地獄王閻羅起正衣服正心正意頭面著佛足長跪叉手白佛言我所典治百三十四獄其一大泥犁中有數千億百萬罪人男女不可計數大泥犁有八中泥犁中泥犁有三十小泥犁小泥犁有九十六小泥犁有千里二千里四千里八千里萬六千里者數千萬里者罪人滿中復有監官小王令長都督五官使者盡屬我天中天世尊大赦大千蒙度我壽未盡當何所統攝耶佛告泥犁王盡赦百三十四獄因並諸餓鬼鬼神龍阿須倫飛鳥走狩盡放之如是不久王獄隨滿不過一日王莫愁耶王當發慈心愍傷眾生不可求名與天王魔王阿須倫共諍求名不可以主民多為尊欲求累劫尊貴約五從戒行六度四恩四等四禪四諦忍辱柔和布施調意寬仁慈愍眾生救濟苦人卑下天下捐棄強粱憍慢之心滅除貪婬斷絕婬鬼之種立清潔之行王當觀察泥犁中罪人坐何等而見考治泥犁中不治善人但治惡逆無行無義無仁無慈無禮無信慳食不信三尊無反復唯治貪婬嫉妒愚癡人耳不問豪尊卑賤罪同一統不問男女少老好醜有識之屬作罪得罪作福得福為罪福所錄無有地方所海水山石間脫止不受死王言唯唯受教輒奉持之不失尊教常宣正法教化罪人令發善心使得解脫憂苦法自在菩薩白佛言三界眾生豈得自在欲至無上正真大道以成阿耨多羅三藐三菩提者斷滅三塗生死之熱惱欲求除己之殃拔地獄之罪名削棄五官之赤籍濟度三界往來之難拔生死之根滅除五處名籍還神本無蕩除三界之想垢淨六神宅平治泥洹之徑路為眾生開泥洹門閈塞三流之川斷絕生死之徑難易云何佛告法自在菩薩汝慈心多愍能為一切眾生重任憂念天下人雜類乃作是問欲度人故耳佛告法自在菩薩及眾生大士皆悉明聽善思念之內著心中佛言愚夫樂生死如豬居溷中恣情放心意自種生死根輪轉更五道因立五處籍繫綴在五道廻行不休息皆由心所種貪婬為死徑愚癡為泥塗沒溺不得出嫉妒為罪本貪利為自衰老不止婬夙夜不學有財不施不受佛言有此八者為自侵欺放逸入三塗百罪從心生心為泥洹君道在身中自心致之不從他人求何有難乎從他人得者爾乃為難心之出入往來無門周流遊洋住止無處心無端底亦無端緒無形無像無遠無近無彼無此無大無小無老無少無好無醜無男無女心之自然生死自然罪福自然道法自然泥洹自然自然者自爾也自然從心生故謂自然高士制御心意法自然泥洹順敘聖諦入八正行卻八邪業除九思求十慧致十神力四無所畏十八不共積功致泥洹寂然無為不動不搖無生不生無死不死獨拔特出滅三界苦除五處籍獨步無畏得無比行入大總持門得無邊底三昧則得成阿耨多羅三藐三菩提法自在菩薩白佛言心得自在何因有若干種類為五道主所見錄籍生死名不除佛言心者心不見心有心不知心心之自然心尊心使中心念善即言即行中心念惡即言即行心無黠計心迷行惑心癡意愚計身有常親愛是身謂是我許沭浴櫛梳好衣美食先欲與之東西走作勤苦思慮求索財寶官爵奉祿香華瓔珞莊餝是身以求榮名名字定空空無所有三界不了空怨求空名為名色六入更樂痛癢思想生死識五陰六衰所誤種生死惑生沒迴旋往來不絕繫名五道皆求貪欲恩愛為生死本是法無常人亦不住如水常流猶如幻化忽生忽死亦無常形又無常名放心在欲行嗜欲增其惑貪色日夜長禍離愛則無患貪欲意為田無厭行為種斷貪除利業離愛無憂患從是拔苦根棄苦昇紫堂永離生死惱終始不復更長存得自在五處為都滅神籍不復用制命為人尊宗仰如帝王尊獨無能過是故稽首禮佛說是時坐中萬菩薩皆得阿惟顏八百比丘皆得無所從生法忍七萬天人皆得法樂忍三十萬天人發無上正真道意三十萬清信士皆得柔順法忍十萬清信女皆得歡喜忍五千比丘尼皆發無上正真道意六十萬鬼神龍王皆逮總持門司隸司命三十二鎮臣特進兵王輔天將軍太子使者皆得淨光三昧侍從盡得不還道五道大王與眷屬具足得往來道地獄王小王凡有百三十七人意平等悉得阿惟越致官屬臣下凡十億得信忍凡士凡女合十億皆得道迹莫不過度病疾除愈盲者得視聾者得聽痾者能語拘躄者得手足女人懷妊母子俱安飛鳥走狩其聞法者盡其壽命皆生天上諸天帝釋皆持七寶蓮華名香搗香澤香雜香繪彩華蓋天幡綩綖以為供養天人天子玉女各各持華香幡彩珍琦雜寶皆散佛上及諸菩薩大比丘上天尊威變化成大殿莫不歡喜發於無上正真道意皆禮佛足爾時國王洴沙與大臣長者三百人離坐叉手長跪白佛言吾等久在大生死沒溺穢海五毒苦樂諸道皆更為老病死恐所司愁苦叵言佛言一切眾生其在大生死中者有十習苦何謂為十習一者生苦二者老苦三者為病苦四者為所愛別苦五者一切不可意為苦六者怨憎共居苦七者愁憂苦八者饑渴苦九者寒貧苦十者死苦復有三苦一者地獄苦二者餓鬼苦三者畜生苦復有二苦一者鬼神龍苦二者不得自在苦皆由習所致苦習諸盡者則苦滅是十習行事屬五官五官屬閻羅閻羅屬佛洴沙王白佛言我有併父昆弟流沙無戒不知屬何官府有何罪事得病三年於今不差世尊難遭願聞其意若令罪大得病當即死罪小者不應久病天地間盡有幾許台閣官府監司幾部人犯幾過為罪何者為小罪犯何過為大罪人死不同有老而死者有壯而死者有少死者有病死者有卒死者為官府所殺者賊殺者燒死者水死者餓死者凍死者渴死者牛馬所殺者若干種死魂神所歸云何願佛垂衰開示盲冥令知禁防有可避者不佛告王曰凡人無戒復無七事行者死屬地獄為五官所司錄命屬地獄天子天子名閻羅典主三界諸天人民鬼神龍飛烏走狩皆盡屬天子天子有八大王八大王復有扶容王三十國扶容王各復有小統九十六國各各所主不同復有外監五官都督司察司錄八王使者司隸等與伏夜大將軍都官唐騎承天帝符與五道大王共於八王日風行覆伺案行諸天人民夷狄雜類鳥狩以知善惡分別種類若干億萬里數分部疆界所屬司征君王臣民疏善記惡以奏上扶容王扶容王轉奏八王八王復轉奏大王大王奏天子人民所犯凡二十事最重亡失人身死不復生遂墮三塗永以不還億千萬不可計劫乃出為畜狩二十惡行引人著三十八大苦處大泥犁中三十八大苦處泥犁各有城廓有八大王有小王三十第一平胡王典主阿鼻摩訶泥犁中有大釜准廣縱四十里其深亦爾罪人滿中但坐殺生婬盜不孝不忠第二晉平王典治黑繩地獄中有鐵繩有三刃者四孤者八孤者拼直人身鋸解之或斧斫人身或四方或八角但坐犯五逆殺生矛杖刀斧害人及畜狩婬盜嫉妒恚癡第三莽都王典治鐵臼獄治榨人身如榨麻油但坐鎮沓殺人及諸眾生第四輔天王典治合會獄中有大鐵釘釘人身百節痛徹遍人身空中自然雨大石碎破人身身小如麵但坐誹謗聖道毒念向佛真人菩薩反逆不孝斷法斷功德輕慢父母師友及所尊殺生無道以致斯殃第五聖都王典治太山獄人適入山山自然合破碎人身骨肉屎尿合碎如榨蒲陶汁但坐犯五逆罪嫉妒愚癡瞋恚尊己賤人不順父母師友君父正教朋黨賊盜婬欺殺生所致第六玄都王典主火城獄火燒人身燋燃盡但坐欺中人無信衣食他人衣食貪利不肯布施凍倮人使身貪好服所致第七廣武王主治劍樹獄獄中刀劍亂風吹斫破人身無完皮復大鷲所食噉但坐屠殺射獵心心為惡故受此殃第八武陽王典主嚾吼獄中有狗斷人頭飲血噉肉但坐心口身行殺人及殺畜狩類倩人殺教人殺故致此殃第九平陽王主治八路獄中有利劍遍地間無空人走其上截足斷趺但坐喜行無慈心齋日相使致其然破壞法橋損眾生強教人犯禁故致斯殃第十都陽王典治刺樹獄獄中樹刺長三丈人適上樹刺下逆人人適下樹刺上逆貫刺人身皆破傷但坐無戒受人信施服餝珍玩常矛刀所刺分攫鉆鈐人念愛身賤他人陰嫉害眾生使獲此極殃第十一消陽王主治沸灰獄獄中有熱沸灰河入其中身悉爛壞但坐得豬羊雞害生可口飲酒迷亂臥沙門被枕中口出惡語無有慈心以獲此殃第十二延慰王典治大噉獄鐵城覆蓋閉其門戶大火四起燒其罪人但坐誣謗三尊及良善人焚燒山澤害眾生命剝脫人衣讒害人不孝三尊及其二親憍慢自恣無戒信故致此極殃第十三廣進王典主大阿鼻獄五毒治人破解人身披挓人身如張牛皮大釘釘之心手足支節皆遍及眼舌耳鼻皆通徹但坐犯五逆十惡並五戒以致此殃第十四高都王主治鐵車獄獄中人鐵犁耕舌上車轢人身但坐虛欺兩舌無信輕慢善人役人三刀自謂應然故致斯殃第十五公陽王主治鐵火獄炭火燃至人膝坐舍正入邪不信善人沙門師友父正教數行來蹈殺蟲蟪不持齋戒或心持齋卻行以致此殃第十六平斛王主治沸屎獄廣長極深罪人入中身體熟爛蟲鑽人身徹髓筋臭穢坐不布施強迫人殺生養身以致斯殃第十七柱陽王主治地燒獄人足到地即燋燃坐入律戒不能忍坐數行來白衣舍齋日卻行來害眾生所致第十八平身王典治彌離獄獄中有蟲嘴如鐵錐喙人肌骨皆令盡但坐捕撮眾生肌汁殺生養身故致其殃第十九璉石王主治山石獄獄中有石利如刀刃與人膝等或高五寸足蹈走上或上或下截足斷趺剝腳斷筋石利如刀坐八王日不行道心雖念善足行遊逸令六神飛揚天官所察以致斯殃第二十狼耶王主治多洹獄獄中有熱風與人相逢吹人辟地嗚呼之極求死不得求生不得生時坐惱人所致第二十一都官王主治犁洹獄獄中有大噉人鬼身中出六十刺而貫人身身中出火燒人食之但坐婬妹犯人婦女及畜生殺眾生故致斯殃第二十二玄陽王主治飛蟲獄蟲飛來食人不置四面來無數但坐射獵蚊虻之對故致斯殃第二十三太一王主治湯河獄流河水熱過於世間沸麻油但坐殺生羅網捕魚易卵飲酒亂失十五行故受此殃第二十四合石王主治大磨獄廣縱二千里磨磨人如面但坐殺生可意研殺眾生垣石相填可殺蚤蟣故致此殃第二十五涼無王主治寒雪獄獄中罪人寒凍但坐凍殺眾生殺後剝脫他人衣禁固眾生著寒中不施和溫之所致故受斯殃第二十六無原王主治鐵杵獄燒杵正赤刺人咽中唇舌腸胃皆悉燋爛但坐惡口求味身行惡心念惡之所致故受斯殃第二十七政始王主治鐵柱獄燒柱正赤令人抱之或臥燒鐵床上為婬鬼所食但坐心口身婬所致故受斯殃第二十八高遠王主治膿血獄坐血食食生不淨施人貪婬所致第二十九都進王主治燒石獄燒石正赤令人吞之燋爛腸胃俱坐無戒食人信施食不持齋戒斷絕人福以為己有之所致故受斯殃第三十原都王主治鐵輪獄燒輪正赤自然出人頭上但坐騎度父母師長君王夫主及所尊持頭抵觸人弄沙門頭形笑蹇吃禿人蹈師友父影火燒人頭故致此殃是為三十大劇苦泥犁犯是二十大過者皆更遍三十泥犁積不可計劫大泥犁形竟次入百四小泥犁終劫竟從地獄出當更餓鬼畜生奴婢下賤積億億萬劫萬恒邊沙數一沙為千劫盡萬恒沙數乃復為人雖得為人口中恒臭口舌妄來多病不利為人短命犯是二十事者今現世不利當為諸天地獄所司神明聽察疏記罪福不問尊卑一月六奏一歲四覆四覆之日皆八王日八王日者天王案比諸天人民雜類之屬考校功罪有福增壽有罪減壽奪算天地浩浩黎庶無數諸天地獄五道大王司命都錄五官都督四鎮王使者承天大將軍等春秋冬夏承天統攝禁察非法總持眾生名藉制命長短毛分不差人民盲冥了不知天地五官所記不能自知生所從來死至何所不能自知命之長短不知為五官所收錄不知豫作善求安不知豫作功德救罪亦不曉依附三尊求後世救不曉求守戒明經道士從求度世道如牛老敗不中用大家言此牛老敗不中用煩勞牧養久已無益我家但當早殺可得肉食之亦可除煩勞人亦如是不奉持戒禁亦不作功德如牛煩勞大家甚多不益大家又不能自活人依道生道氣養之不肯奉道亦不能自度為五官所收死付地獄盡屬三十王所治如是
